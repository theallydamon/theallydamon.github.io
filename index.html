                      <button onClick={() => remove(i.id)} style={{ ...iconBtn, padding: 2 }} aria-label="Delete"><X size={11} /></button>
                    </span></div>
                  </div>
                  );
                })}
                {cItems.length === 0 && <div className="rounded-lg text-center" style={{ border: `1px dashed ${LINE}`, fontSize: 12, color: FAINT, borderRadius: 10, padding: "14px 6px" }}>{ql ? "No match" : "Empty"}</div>}
              </div>
            </div>
          );
        })}
      </div>
      {content.items.some((i) => i.status === "Posted") && <button onClick={clearPosted} className="mt-3" style={{ ...iconBtn, fontSize: 11.5 }}>Clear posted archive</button>}
    </section>
  );
}

function RingDark({ value, max, label, tint, size = 100 }) {
  const r = (size - 9) / 2, c = 2 * Math.PI * r, pct = max ? Math.min(1, value / max) : 0;
  return (
    <div className="flex flex-col items-center" style={{ flexShrink: 0, gap: 3 }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} role="img" aria-label={`${label} since post`} style={{ position: "relative" }}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="9" />
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={tint} strokeWidth="9" strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c * (1 - pct)} transform={`rotate(-90 ${size / 2} ${size / 2})`} style={{ transition: "stroke-dashoffset 0.6s ease" }} />
        <text x={size / 2} y={size / 2} textAnchor="middle" dominantBaseline="central" fill="#fff" style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontSize: size * 0.26, fontWeight: 700 }}>{label}</text>
      </svg>
      <span style={{ fontSize: 9, letterSpacing: "0.06em", color: "rgba(255,255,255,0.55)", whiteSpace: "nowrap" }}>SINCE POST</span>
    </div>
  );
}

/* ================= SONG ================= */
function SongModule({ data, setData }) {
  const song = data.song;
  const patch = (p) => setData((d) => ({ ...d, song: { ...d.song, ...p } }));
  const updateStage = (id, p) => patch({ stages: song.stages.map((s) => (s.id === id ? { ...s, ...p } : s)) });
  const updateGear = (id, p) => patch({ gear: song.gear.map((g) => (g.id === id ? { ...g, ...p } : g)) });
  const addGear = () => patch({ gear: [...song.gear, { id: uid(), name: "New item", price: 0, bought: false }] });
  const removeGear = (id) => patch({ gear: song.gear.filter((g) => g.id !== id) });
  const done = song.stages.filter((s) => s.status === "done").length;
  const gearTotal = song.gear.reduce((s, g) => s + (Number(g.price) || 0), 0);
  const gearSpent = song.gear.filter((g) => g.bought).reduce((s, g) => s + (Number(g.price) || 0), 0);

  /* the "current" stage is derived — the first not-done stage in order — never stored.
     that way it can never get stuck: toggle any stage's checkbox to mark it done (which
     unlocks the next one) or undo it, and the current step always recalculates from that. */
  const currentIdx = song.stages.findIndex((s) => s.status !== "done");
  const toggleStage = (i) => {
    const wasDone = song.stages[i].status === "done";
    patch({ stages: song.stages.map((st, j) => (j === i ? { ...st, status: wasDone ? "todo" : "done", lastProgress: wasDone ? st.lastProgress : todayISO() } : st)) });
  };

  return (
    <section>
      <SectionHead title="Get a song out" sub="One roadmap from sing test to release. Only the stage you're on right now carries a deadline — finish it to unlock the next." />
      <div className="rounded-2xl mb-6 flex items-center gap-4" style={{ ...card, borderRadius: 16, padding: 16, background: `linear-gradient(135deg, ${C.lilacBg}, ${C.card})`, border: `1px solid ${C.lilac}33` }}>
        <Ring pct={done / song.stages.length} tint={C.lilac} size={58} thick={7} label={`${done}`} />
        <div className="flex-1"><div style={{ fontSize: 13, color: MUT, marginBottom: 6 }}>{done} of {song.stages.length} stages done</div><Bar pct={done / song.stages.length} tint={C.lilac} /></div>
      </div>
      <div className="flex flex-col">
        {song.stages.map((s, i) => {
          const isDone = s.status === "done", isCurrent = !isDone && i === currentIdx, isLocked = !isDone && !isCurrent;
          const tint = isDone ? C.mint : isCurrent ? AURAS[i % AURAS.length] : FAINT;
          return (
          <div key={s.id} className="flex gap-4" style={{ opacity: isLocked ? 0.7 : 1 }}>
            <div className="flex flex-col items-center" style={{ width: 36, flexShrink: 0 }}>
              <button onClick={() => toggleStage(i)} aria-label={isDone ? "Mark not done" : "Mark done"} title={isLocked ? "Out of order — click to mark done anyway and skip ahead" : isDone ? "Mark not done" : "Mark done"}
                style={{ width: 34, height: 34, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", background: isDone ? C.mint : isCurrent ? `${tint}22` : C.card, border: `1px solid ${isDone ? C.mint : isCurrent ? tint : LINE}`, fontFamily: "'Bricolage Grotesque', sans-serif", fontSize: 13, fontWeight: 600, color: isDone ? "#fff" : isCurrent ? tint : MUT }}>
                {isDone ? <Check size={16} strokeWidth={3} /> : isLocked ? <Lock size={14} /> : i + 1}
              </button>
              {i < song.stages.length - 1 && <div style={{ width: 2, flex: 1, minHeight: 22, background: isDone ? `${C.mint}66` : LINE }} />}
            </div>
            <div data-nav-id={s.id} className="rounded-2xl p-4 mb-4 flex-1" style={{ ...card, borderRadius: 16, borderLeft: `3px solid ${tint}`, background: isCurrent ? `${tint}0d` : card.background }}>
              <div className="flex items-center gap-2 flex-wrap">
                <div className="flex-1" style={{ minWidth: 140, textDecoration: isDone ? "line-through" : "none" }}><InlineEdit value={s.name} onChange={(v) => updateStage(s.id, { name: v })} strong /></div>
                <span className="rounded-full px-3 py-1" style={{ fontSize: 11, fontWeight: 600, background: `${tint}1e`, border: `1px solid ${tint}55`, color: tint }}>{isDone ? "Done" : isCurrent ? "Current" : "Locked"}</span>
              </div>
              <div style={{ fontSize: 12.5, color: MUT, margin: "4px 0 6px" }}>{s.desc}</div>
              {s.kind === "gear" && (
                <div className="rounded-xl p-3 my-2" style={{ ...cardSoft, borderRadius: 12 }}>
                  {song.gear.map((g) => (
                    <div key={g.id} className="flex items-center gap-2 py-1 flex-wrap">
                      <button onClick={() => updateGear(g.id, { bought: !g.bought })} aria-label="Toggle bought" style={{ width: 22, height: 22, borderRadius: 7, cursor: "pointer", flexShrink: 0, background: g.bought ? C.mint : C.card, border: `1px solid ${g.bought ? C.mint : LINE}`, display: "flex", alignItems: "center", justifyContent: "center" }}>{g.bought && <Check size={13} color="#fff" strokeWidth={3} />}</button>
                      <div className="flex-1" style={{ minWidth: 130, textDecoration: g.bought ? "line-through" : "none", opacity: g.bought ? 0.55 : 1 }}><InlineEdit value={g.name} onChange={(v) => updateGear(g.id, { name: v })} /></div>
                      <span style={{ fontSize: 12, color: MUT }}>R</span>
                      <input type="number" min="0" value={g.price || ""} placeholder="0" onChange={(e) => updateGear(g.id, { price: Number(e.target.value) || 0 })} className="rounded-lg px-2 py-1" style={{ ...inputStyle, width: 86, fontSize: 12 }} />
                      <button onClick={() => removeGear(g.id)} style={iconBtn} aria-label="Remove"><X size={12} /></button>
                    </div>
                  ))}
                  <div className="flex items-center justify-between mt-2 flex-wrap gap-2">
                    <button onClick={addGear} className="flex items-center gap-1" style={{ ...iconBtn, color: C.lilac, fontSize: 12 }}><Plus size={12} /> Add item</button>
                    <span style={{ fontSize: 12, color: MUT }}>Spent <b style={{ color: C.mint }}>{fmtR(gearSpent)}</b> of {fmtR(gearTotal)}</span>
                  </div>
                </div>
              )}
              {s.kind === "mix" && (
                <div className="flex gap-2 my-2 flex-wrap">{MIX_ROUTES.map((r) => (
                  <button key={r} onClick={() => patch({ mixRoute: song.mixRoute === r ? "" : r })} className="rounded-full px-3 py-1.5" style={{ fontSize: 12, cursor: "pointer", fontFamily: "inherit", background: song.mixRoute === r ? `${C.coral}22` : FILL, border: `1px solid ${song.mixRoute === r ? C.coral : LINE}`, color: song.mixRoute === r ? C.coral : MUT }}>{r}{song.mixRoute === r ? " ✓" : ""}</button>
                ))}</div>
              )}
              <InlineEdit value={s.note} onChange={(v) => updateStage(s.id, { note: v })} placeholder="Notes…" dim />
              {isCurrent && <PriorityControls item={s} onChange={(p) => updateStage(s.id, p)} />}
            </div>
          </div>
        ); })}
      </div>
    </section>
  );
}

/* ================= UNLOCKS (Discovery ecosystem) ================= */
const ECO_STATE = {
  live:     { label: "Live",        tint: C.mint,   dot: C.mint },
  progress: { label: "In progress", tint: C.yellow, dot: C.yellow },
  locked:   { label: "Locked",      tint: FAINT,    dot: FAINT },
  parked:   { label: "Parked",      tint: C.sky,    dot: C.sky },
};
const ECO_CYCLE = { locked: "progress", progress: "live", live: "parked", parked: "locked" };

function UnlocksModule({ data, setData }) {
  const eco = data.unlocks.ecosystem || { pillars: [], keystoneNote: "" };

  const patchBenefit = (pid, bid, p) => setData((d) => ({ ...d, unlocks: { ...d.unlocks, ecosystem: { ...d.unlocks.ecosystem, pillars: d.unlocks.ecosystem.pillars.map((pl) => pl.id === pid ? { ...pl, benefits: pl.benefits.map((b) => b.id === bid ? { ...b, ...p } : b) } : pl) } } }));
  const addBenefit = (pid) => setData((d) => ({ ...d, unlocks: { ...d.unlocks, ecosystem: { ...d.unlocks.ecosystem, pillars: d.unlocks.ecosystem.pillars.map((pl) => pl.id === pid ? { ...pl, benefits: [...pl.benefits, { id: uid(), label: "New benefit", state: "locked", note: "", due: null, priority: "Medium", lastProgress: null, created: todayISO() }] } : pl) } } }));
  const removeBenefit = (pid, bid) => setData((d) => ({ ...d, unlocks: { ...d.unlocks, ecosystem: { ...d.unlocks.ecosystem, pillars: d.unlocks.ecosystem.pillars.map((pl) => pl.id === pid ? { ...pl, benefits: pl.benefits.filter((b) => b.id !== bid) } : pl) } } }));

  /* chains (apartment gating + car ownership) */
  const updateNode = (cid, nid, p) => setData((d) => ({ ...d, unlocks: { ...d.unlocks, chains: d.unlocks.chains.map((c) => c.id === cid ? { ...c, nodes: c.nodes.map((n) => (n.id === nid ? { ...n, ...p } : n)) } : c) } }));
  const cycle = { locked: "active", active: "done", done: "locked" };

  const allB = eco.pillars.flatMap((p) => p.benefits);
  const liveN = allB.filter((b) => b.state === "live").length;

  return (
    <section>
      <SectionHead title="Discovery ecosystem" />

      {/* pillars */}
      <div className="grid gap-4" style={{ gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))" }}>
        {eco.pillars.map((pl) => {
          const live = pl.benefits.filter((b) => b.state === "live").length;
          return (
            <div key={pl.id} className="rounded-2xl p-4" style={{ ...card, borderRadius: 18, borderTop: `2px solid ${pl.accent}` }}>
              <div className="flex items-center gap-2 mb-1">
                <span style={{ fontSize: 20 }}>{pl.emoji}</span>
                <div className="flex-1"><span style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 600, fontSize: 16 }}>{pl.name}</span></div>
                <span style={{ fontSize: 11, color: MUT }}>{live}/{pl.benefits.length} live</span>
              </div>
              <p style={{ fontSize: 12, color: MUT, margin: "0 0 12px", lineHeight: 1.45 }}>{pl.role}</p>
              <div className="flex flex-col gap-2">
                {pl.benefits.map((b) => {
                  const st = ECO_STATE[b.state] || ECO_STATE.locked;
                  return (
                    <div key={b.id} data-nav-id={b.id} className="rounded-xl p-2.5" style={{ ...cardSoft, borderRadius: 12, opacity: b.state === "locked" ? 0.62 : 1, borderLeft: b.keystone ? `2px solid ${C.lilac}` : `1px solid ${LINE}` }}>
                      <div className="flex items-start gap-2">
                        <button onClick={() => patchBenefit(pl.id, b.id, { state: ECO_CYCLE[b.state] })} aria-label={`State ${b.state}`} className={b.state === "progress" ? "pulse-dot" : ""} style={{ width: 12, height: 12, borderRadius: 99, marginTop: 4, flexShrink: 0, cursor: "pointer", background: st.dot, border: "none" }} />
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-1">
                            <div className="flex-1 min-w-0"><InlineEdit value={b.label} onChange={(v) => patchBenefit(pl.id, b.id, { label: v })} strong /></div>
                            {b.keystone && <span style={{ fontSize: 13 }} title="Keystone">🗝️</span>}
                            <button onClick={() => removeBenefit(pl.id, b.id)} style={iconBtn} aria-label="Remove"><X size={11} /></button>
                          </div>
                          <div className="flex items-center gap-1.5 flex-wrap" style={{ marginTop: 2 }}>
                            <span style={{ fontSize: 10, letterSpacing: "0.04em", textTransform: "uppercase", color: st.tint, fontWeight: 600 }}>{st.label}</span>
                            {b.ampFrom && <span className="rounded" style={{ fontSize: 10, color: C.lilac, background: "rgba(123,103,224,0.14)", padding: "1px 6px", borderRadius: 6 }}>↑ amplified by {b.ampFrom}</span>}
                          </div>
                          <InlineEdit value={b.note || ""} onChange={(v) => patchBenefit(pl.id, b.id, { note: v })} placeholder="Detail…" dim />
                          {b.state === "progress" && <PriorityControls item={b} onChange={(p) => patchBenefit(pl.id, b.id, p)} />}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
              <button onClick={() => addBenefit(pl.id)} className="flex items-center gap-1 mt-2" style={{ ...iconBtn, color: pl.accent, fontSize: 12 }}><Plus size={12} /> Add benefit</button>
            </div>
          );
        })}
      </div>

      {/* legend */}
      <div className="flex items-center gap-4 flex-wrap mt-4 mb-6" style={{ fontSize: 11, color: MUT }}>
        {Object.values(ECO_STATE).map((s) => (
          <span key={s.label} className="flex items-center gap-1.5"><span style={{ width: 9, height: 9, borderRadius: 99, background: s.dot }} />{s.label}</span>
        ))}
        <span className="flex items-center gap-1.5" style={{ color: C.lilac }}>🗝️ keystone · unlocks multiple branches</span>
      </div>

      {/* gated tracks (linear by nature: apartment + car ownership) */}
      <SectionHead title="Sequential tracks" sub="These are genuinely linear, each step gates the next. Tap the icon to cycle locked, in progress, done." />
      <div className="grid gap-4" style={{ gridTemplateColumns: "repeat(auto-fit, minmax(320px, 1fr))" }}>
        {data.unlocks.chains.map((ch) => {
          const tint = /apartment/i.test(ch.name) ? C.peach : C.sky;
          const done = ch.nodes.filter((n) => n.status === "done").length;
          return (
            <div key={ch.id} className="rounded-2xl p-4" style={{ ...card, borderRadius: 18 }}>
              <div className="flex items-center gap-3 mb-3">
                <Ring pct={ch.nodes.length ? done / ch.nodes.length : 0} tint={tint} size={50} thick={6} label={`${done}`} />
                <div className="flex-1"><span style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 600, fontSize: 15 }}>{ch.name}</span><div style={{ fontSize: 12, color: MUT }}>{done}/{ch.nodes.length} done</div></div>
              </div>
              <div className="flex flex-col">
                {ch.nodes.map((n, i) => (
                  <div key={n.id} className="flex gap-3">
                    <div className="flex flex-col items-center" style={{ width: 30, flexShrink: 0 }}>
                      <button onClick={() => updateNode(ch.id, n.id, { status: cycle[n.status] })} aria-label={`Status ${n.status}`} className={n.status === "active" ? "pulse-dot" : ""} style={{ width: 28, height: 28, borderRadius: 10, cursor: "pointer", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", background: n.status === "done" ? tint : n.status === "active" ? `${tint}22` : C.card, border: `1px solid ${n.status === "done" ? tint : n.status === "active" ? tint : LINE}` }}>
                        {n.status === "done" && <Check size={14} color="#fff" strokeWidth={3} />}
                        {n.status === "active" && <Sparkles size={13} color={tint} />}
                        {n.status === "locked" && <Lock size={12} color={FAINT} />}
                      </button>
                      {i < ch.nodes.length - 1 && <div style={{ width: 2, flex: 1, minHeight: 16, background: n.status === "done" ? `${tint}66` : LINE }} />}
                    </div>
                    <div data-nav-id={n.id} className="flex-1 pb-3" style={{ opacity: n.status === "locked" ? 0.6 : 1, minWidth: 0 }}>
                      <InlineEdit value={n.label} onChange={(v) => updateNode(ch.id, n.id, { label: v })} strong />
                      <InlineEdit value={n.sub} onChange={(v) => updateNode(ch.id, n.id, { sub: v })} placeholder="Detail…" dim />
                      {n.status === "active" && <PriorityControls item={n} onChange={(p) => updateNode(ch.id, n.id, p)} />}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </section>
  );
}

/* ================= APARTMENT ================= */
function ApartmentModule({ data, setData, unlocked, go, q }) {
  const items = data.apartment.items;
  const ql = (q || "").toLowerCase();
  const patch = (p) => setData((d) => ({ ...d, apartment: { ...d.apartment, ...p } }));
  const update = (id, p) => patch({ items: items.map((i) => (i.id === id ? { ...i, ...p } : i)) });
  const add = () => patch({ items: [...items, { id: uid(), name: "New item", source: "", budget: 0, status: "To source", paid: 0 }] });
  const remove = (id) => patch({ items: items.filter((i) => i.id !== id) });
  const ITEM_STATUSES = ["To source", "Watching", "Bought"], ST = { "To source": MUT, Watching: C.sky, Bought: C.mint };
  const cycleStatus = (s) => ITEM_STATUSES[(ITEM_STATUSES.indexOf(s) + 1) % ITEM_STATUSES.length];
  const budgetTotal = items.reduce((s, i) => s + (Number(i.budget) || 0), 0);
  const spent = items.filter((i) => i.status === "Bought").reduce((s, i) => s + (Number(i.paid) || 0), 0);
  const boughtCount = items.filter((i) => i.status === "Bought").length;
  const over = spent > budgetTotal;

  if (!unlocked) {
    const apt = data.unlocks.chains.find((ch) => /apartment/i.test(ch.name)) || data.unlocks.chains.find((ch) => ch.nodes.some((n) => /move\s*in/i.test(n.label)));
    const nodes = apt ? apt.nodes : [];
    const done = nodes.filter((n) => n.status === "done").length;
    return (
      <section>
        <SectionHead title="8 Kingsbury · furnishing" sub="Locked until you move in. It opens automatically when the Move-in step is done." />
        <div className="rounded-2xl p-8 text-center" style={{ ...card, borderRadius: 20, maxWidth: 560, margin: "0 auto" }}>
          <div style={{ fontSize: 40, marginBottom: 8 }}>🛋️🔒</div>
          <h3 style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 600, fontSize: 19, margin: "0 0 6px" }}>Furnishing opens after move-in</h3>
          <p style={{ fontSize: 13.5, color: MUT, margin: "0 auto 16px", maxWidth: 380, lineHeight: 1.5 }}>The {fmtR(budgetTotal)} plan and all {items.length} items are ready. This unlocks the moment you tick Move in on the Apartment chain.</p>
          <div className="rounded-xl p-4 text-left" style={{ ...cardSoft, borderRadius: 14, maxWidth: 420, margin: "0 auto 16px" }}>
            <div className="flex items-center justify-between mb-2"><span style={{ fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", color: MUT }}>Apartment chain</span><span style={{ fontSize: 12, color: C.yellow }}>{done}/{nodes.length}</span></div>
            {nodes.map((n) => (
              <div key={n.id} className="flex items-center gap-2 py-1" style={{ fontSize: 13, opacity: n.status === "locked" ? 0.55 : 1 }}>
                {n.status === "done" ? <Check size={14} color={C.mint} strokeWidth={3} /> : n.status === "active" ? <Sparkles size={13} color={C.yellow} /> : <Lock size={12} color={FAINT} />}
                <span style={{ textDecoration: n.status === "done" ? "line-through" : "none", fontWeight: /move\s*in/i.test(n.label) ? 600 : 400 }}>{n.label}</span>
              </div>
            ))}
          </div>
          <div className="flex gap-2 justify-center flex-wrap">
            <button onClick={() => go("unlocks")} style={pillDark}>Open the Apartment chain</button>
            <button onClick={() => patch({ unlockedOverride: true })} style={pillGhost}>Open early anyway</button>
          </div>
        </div>
      </section>
    );
  }

  let shown = items;
  if (ql) shown = items.filter((i) => i.name.toLowerCase().includes(ql) || (i.source || "").toLowerCase().includes(ql));
  return (
    <section>
      <SectionHead title="8 Kingsbury · furnishing" sub="From your Apartment Budget note. Tap a status pill to cycle it, log the real price when you buy." action={<AddBtn onClick={add} label="Add item" />} />
      {data.apartment.unlockedOverride && (
        <div className="rounded-xl px-3 py-2 mb-4 flex items-center justify-between flex-wrap gap-2" style={{ background: `${C.amber}14`, border: `1px solid ${C.amber}44`, borderRadius: 12, fontSize: 12.5 }}>
          <span>Opened early. Normally gated until move-in.</span><button onClick={() => patch({ unlockedOverride: false })} style={{ ...iconBtn, fontSize: 12, color: C.amber }}>Re-lock</button>
        </div>
      )}
      <div className="rounded-2xl p-7 mb-7 flex items-center gap-7 flex-wrap" style={{ ...card, borderRadius: 20 }}>
        <Ring pct={budgetTotal ? spent / budgetTotal : 0} tint={over ? C.rose : C.mint} size={100} thick={12} label={`${Math.round((budgetTotal ? spent / budgetTotal : 0) * 100)}%`} />
        <div className="flex-1" style={{ minWidth: 240 }}>
          <div style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontSize: 32, fontWeight: 700, color: over ? C.rose : C.ink }}>{fmtR(spent)} <span style={{ fontSize: 15, color: MUT, fontWeight: 400 }}>of {fmtR(budgetTotal)} plan</span></div>
          <div style={{ fontSize: 14.5, color: C.mint, marginBottom: 8 }}>{boughtCount}/{items.length} items bought</div>
          <Bar pct={budgetTotal ? spent / budgetTotal : 0} tint={over ? C.rose : C.mint} />
          <div style={{ fontSize: 12.5, color: FAINT, marginTop: 10 }}>Tiers: budget ~R26k · medium R38-45k · high R55-65k</div>
        </div>
      </div>
      <div className="flex flex-col gap-3">
        {shown.map((i) => (
          <div key={i.id} className="rounded-2xl px-5 py-4 flex items-center gap-4 flex-wrap" style={{ ...card, borderRadius: 16, borderLeft: `3px solid ${ST[i.status]}` }}>
            <button onClick={() => update(i.id, { status: cycleStatus(i.status) })} className="rounded-full px-3.5 py-1.5" style={{ fontSize: 12.5, cursor: "pointer", fontFamily: "inherit", width: 108, flexShrink: 0, background: `${ST[i.status]}1a`, border: `1px solid ${ST[i.status]}55`, color: ST[i.status] }}>{i.status}</button>
            <div className="flex-1" style={{ minWidth: 220 }}><InlineEdit value={i.name} onChange={(v) => update(i.id, { name: v })} strong /><InlineEdit value={i.source} onChange={(v) => update(i.id, { source: v })} placeholder="Source…" dim /></div>
            <div style={{ fontSize: 12.5, color: MUT }}>budget<input type="number" min="0" value={i.budget || ""} placeholder="0" onChange={(e) => update(i.id, { budget: Number(e.target.value) || 0 })} className="rounded-lg px-2.5 py-1.5 ml-1.5" style={{ ...inputStyle, width: 96, fontSize: 13.5 }} /></div>
            <div style={{ fontSize: 12.5, color: i.status === "Bought" ? C.mint : MUT }}>paid<input type="number" min="0" value={i.paid || ""} placeholder="0" onChange={(e) => update(i.id, { paid: Number(e.target.value) || 0 })} className="rounded-lg px-2.5 py-1.5 ml-1.5" style={{ ...inputStyle, width: 96, fontSize: 13.5 }} /></div>
            <button onClick={() => remove(i.id)} style={iconBtn} aria-label="Delete"><Trash2 size={15} /></button>
          </div>
        ))}
        {shown.length === 0 && <Empty text={ql ? "No item matches your search." : "No items. Add what the apartment needs."} />}
      </div>
    </section>
  );
}

/* ================= LIFE ADMIN ================= */
/* Personal catch-all pillar: a flat kanban of your own life stuff (paperwork, errands, calls to
   make), sharing the exact same due-date/priority engine as every other pillar (PriorityControls,
   computeUrgency) so it feeds the main Priorities dashboard with zero special-casing. */
function LifeAdminModule({ data, setData, q }) {
  const [title, setTitle] = useState(""); const [description, setDescription] = useState(""); const [due, setDue] = useState("");
  const items = data.lifeAdmin.items || [];
  const ql = (q || "").toLowerCase();
  const add = () => {
    const t = title.trim(); if (!t) return;
    setData((d) => ({ ...d, lifeAdmin: { ...d.lifeAdmin, items: [{ id: uid(), title: t, description: description.trim(), status: "To do", created: todayISO(), due: due || null, priority: priorityForNewTask(due || null), lastProgress: null }, ...(d.lifeAdmin.items || [])] } }));
    setTitle(""); setDescription(""); setDue("");
  };
  const advance = (id) => setData((d) => ({ ...d, lifeAdmin: { ...d.lifeAdmin, items: d.lifeAdmin.items.map((t) => { if (t.id !== id) return t; const status = TASK_COLS[Math.min(TASK_COLS.indexOf(t.status) + 1, 2)]; return { ...t, status, doneAt: status === "Done" ? Date.now() : t.doneAt }; }) } }));
  const back = (id) => setData((d) => ({ ...d, lifeAdmin: { ...d.lifeAdmin, items: d.lifeAdmin.items.map((t) => { if (t.id !== id) return t; const status = TASK_COLS[Math.max(TASK_COLS.indexOf(t.status) - 1, 0)]; return { ...t, status, doneAt: status === "Done" ? t.doneAt : null }; }) } }));
  const update = (id, p) => setData((d) => ({ ...d, lifeAdmin: { ...d.lifeAdmin, items: d.lifeAdmin.items.map((t) => (t.id === id ? { ...t, ...p } : t)) } }));
  const remove = (id) => setData((d) => ({ ...d, lifeAdmin: { ...d.lifeAdmin, items: d.lifeAdmin.items.filter((t) => t.id !== id) } }));
  const clearDone = () => setData((d) => ({ ...d, lifeAdmin: { ...d.lifeAdmin, items: d.lifeAdmin.items.filter((t) => t.status !== "Done") } }));
  const visible = ql ? items.filter((t) => t.title.toLowerCase().includes(ql) || (t.description || "").toLowerCase().includes(ql)) : items;
  return (
    <section>
      <SectionHead title="Life admin" sub="Your own stuff: paperwork, errands, calls to make. Same due date and priority logic as everywhere else." />
      <div className="rounded-2xl p-4 mb-6" style={{ ...card, borderRadius: 16 }}>
        <div className="flex gap-2 flex-wrap mb-2">
          <input value={title} onChange={(e) => setTitle(e.target.value)} onKeyDown={(e) => e.key === "Enter" && add()} placeholder="What needs doing?" className="flex-1 rounded-lg px-3 py-2" style={{ ...inputStyle, minWidth: 200 }} />
          <input type="date" value={due} onChange={(e) => setDue(e.target.value)} className="rounded-lg px-3 py-2" style={{ ...inputStyle, width: 150 }} aria-label="Due date (optional)" title="Due date (optional) — auto-sets the priority" />
        </div>
        <div className="flex gap-2 flex-wrap items-start">
          <GrowingTextarea value={description} onChange={setDescription} placeholder="Description (optional) — the actual detail. Keeps the title short." rows={2} className="flex-1 rounded-lg px-3 py-2" style={{ ...inputStyle, minWidth: 200, lineHeight: 1.45 }} />
          <button onClick={add} style={pillDark}><Plus size={14} style={{ display: "inline", marginRight: 4 }} />Add</button>
        </div>
      </div>
      <div style={{ borderTop: `1px solid ${LINE}`, margin: "-2px 0 20px" }} />
      <div className="grid gap-4" style={{ gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))" }}>
        {TASK_COLS.map((col) => {
          const colItems = visible.filter((t) => t.status === col);
          return (
            <div key={col} className="rounded-2xl p-3" style={{ ...cardSoft, borderRadius: 16 }}>
              <div className="flex items-center justify-between mb-3 px-1"><span style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 600, fontSize: 12, letterSpacing: "0.04em", textTransform: "uppercase" }}>{col}</span><span style={{ fontSize: 12, color: MUT }}>{colItems.length}</span></div>
              <div className="flex flex-col gap-2">
                {colItems.map((t) => (
                  <div key={t.id} data-nav-id={t.id} className="rounded-xl p-3" style={{ ...card, borderRadius: 12, borderLeft: `2px solid ${C.rose}` }}>
                    <div style={{ fontSize: 13.5, textDecoration: col === "Done" ? "line-through" : "none", opacity: col === "Done" ? 0.55 : 1 }}><InlineEdit value={t.title} onChange={(v) => update(t.id, { title: v })} /></div>
                    <div style={{ fontSize: 11.5, color: MUT, marginTop: 2 }}><InlineEdit value={t.description || ""} onChange={(v) => update(t.id, { description: v })} placeholder="Add a description…" /></div>
                    <div className="flex items-center gap-2 mt-2 flex-wrap" style={{ fontSize: 11, color: MUT }}>
                      <span className="ml-auto flex gap-1">
                        {col !== "To do" && <button onClick={() => back(t.id)} style={iconBtn} aria-label="Back">←</button>}
                        {col !== "Done" && <button onClick={() => advance(t.id)} style={{ ...iconBtn, color: C.mint }} aria-label="Forward">→</button>}
                        <button onClick={() => remove(t.id)} style={iconBtn} aria-label="Delete"><X size={12} /></button>
                      </span>
                    </div>
                    {col !== "Done" && <PriorityControls item={t} onChange={(p) => update(t.id, p)} />}
                  </div>
                ))}
                {colItems.length === 0 && <div className="rounded-xl p-3 text-center" style={{ border: `1px dashed ${LINE}`, fontSize: 12, color: FAINT, borderRadius: 12 }}>Empty</div>}
              </div>
            </div>
          );
        })}
      </div>
      {items.some((t) => t.status === "Done") && <button onClick={clearDone} className="mt-4" style={{ ...iconBtn, fontSize: 12 }}>Clear done</button>}
    </section>
  );
}

/* ================= DEALS ================= */
const CLIENT_TINT = { Lead: C.sky, Active: C.mint, Paused: MUT };
const DEAL_TYPE_TINT = { Active: C.mint, Prospect: C.sky };

/* shared mini task tracker: used under each brand deal and each client so granular
   action items ("reply to email", "send rate card"...) get their own due date + priority
   and feed straight into the Priorities dashboard via collectPriorityTasks. */
function MiniTaskList({ tasks, onChange }) {
  const [title, setTitle] = useState(""); const [description, setDescription] = useState(""); const [due, setDue] = useState("");
  const list = tasks || [];
  const add = () => {
    const t = title.trim(); if (!t) return;
    onChange([{ id: uid(), title: t, description: description.trim(), due: due || null, priority: priorityForNewTask(due || null), lastProgress: null, done: false, created: todayISO() }, ...list]);
    setTitle(""); setDescription(""); setDue("");
  };
  const update = (id, p) => onChange(list.map((t) => (t.id === id ? { ...t, ...p } : t)));
  const remove = (id) => onChange(list.filter((t) => t.id !== id));
  return (
    <div className="flex flex-col gap-1.5">
      <div className="flex gap-1.5">
        <input value={title} onChange={(e) => setTitle(e.target.value)} onKeyDown={(e) => e.key === "Enter" && add()} placeholder="Add a task (e.g. Reply to email)…" className="flex-1 rounded-lg px-2 py-1.5" style={{ ...inputStyle, fontSize: 12 }} />
        <input type="date" value={due} onChange={(e) => setDue(e.target.value)} className="rounded-lg px-2 py-1.5" style={{ ...inputStyle, fontSize: 11, width: 120 }} aria-label="Due date (optional)" title="Due date (optional) — auto-sets the priority" />
      </div>
      <div className="flex gap-1.5 items-start">
        <GrowingTextarea value={description} onChange={setDescription} onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); add(); } }} placeholder="Description (optional)…" rows={1} className="flex-1 rounded-lg px-2 py-1.5" style={{ ...inputStyle, fontSize: 11.5, lineHeight: 1.4 }} />
        <button onClick={add} style={{ ...pillDark, fontSize: 11, padding: "5px 10px" }}><Plus size={11} style={{ display: "inline", marginRight: 3 }} />Add</button>
      </div>
      <div style={{ borderTop: `1px solid ${LINE}`, margin: "2px 0" }} />
      {list.length === 0 && <div style={{ fontSize: 11.5, color: FAINT }}>No tasks yet.</div>}
      {list.map((t) => (
        <div key={t.id} data-nav-id={t.id} className="rounded-lg px-2.5 py-2" style={{ background: C.soft, border: `1px solid ${LINE}`, opacity: t.done ? 0.5 : 1 }}>
          <div className="flex items-center gap-2">
            <button onClick={() => update(t.id, { done: !t.done, doneAt: !t.done ? Date.now() : null })} aria-label="Toggle done" style={{ width: 18, height: 18, borderRadius: 6, cursor: "pointer", flexShrink: 0, background: t.done ? C.mint : C.card, border: `1px solid ${t.done ? C.mint : LINE}`, display: "flex", alignItems: "center", justifyContent: "center" }}>{t.done && <Check size={11} color="#fff" strokeWidth={3} />}</button>
            <div className="flex-1 min-w-0" style={{ textDecoration: t.done ? "line-through" : "none" }}><InlineEdit value={t.title} onChange={(v) => update(t.id, { title: v })} /></div>
            <button onClick={() => remove(t.id)} style={{ ...iconBtn, padding: 2 }} aria-label="Delete"><X size={11} /></button>
          </div>
          <div style={{ fontSize: 11, color: MUT, marginTop: 2, marginLeft: 26 }}><InlineEdit value={t.description || ""} onChange={(v) => update(t.id, { description: v })} placeholder="Add a description…" /></div>
          {!t.done && <PriorityControls item={t} onChange={(p) => update(t.id, p)} />}
        </div>
      ))}
    </div>
  );
}

function DealCard({ x, open, onToggleOpen, update, remove, isProspect }) {
  /* card accent follows Active/Prospect status (green/blue), not a random decorative aura —
     so at a glance every active deal is green and every prospect is blue, consistently. */
  const tint = isProspect ? C.sky : C.mint;
  const idx = DEAL_STAGES.indexOf(x.stage);
  const typeTint = DEAL_TYPE_TINT[isProspect ? "Prospect" : "Active"];
  return (
    <div data-nav-id={x.id} className="rounded-2xl p-4" style={{ ...card, borderRadius: 16, borderLeft: `3px solid ${tint}`, opacity: x.stage === "Posted" ? 0.65 : 1 }}>
      <div className="flex items-center gap-3 flex-wrap">
        <div className="flex-1" style={{ minWidth: 150 }}><InlineEdit value={x.brand} onChange={(v) => update(x.id, { brand: v })} strong /><InlineEdit value={x.deliverable} onChange={(v) => update(x.id, { deliverable: v })} placeholder="Deliverable (e.g. 1x Reel + story)" dim /></div>
        <button onClick={() => update(x.id, { type: isProspect ? "Active" : "Prospect" })} className="rounded-full px-2.5 py-1" style={{ fontSize: 10.5, cursor: "pointer", fontFamily: "inherit", background: `${typeTint}1a`, border: `1px solid ${typeTint}55`, color: typeTint, whiteSpace: "nowrap" }}>{isProspect ? "→ mark active" : "→ mark prospect"}</button>
        {x.due && <DueChip due={x.due} />}
        <input type="date" value={x.due || ""} onChange={(e) => update(x.id, { due: e.target.value })} className="rounded-lg px-2 py-1" style={{ ...inputStyle, fontSize: 12 }} aria-label="Due" />
        <button onClick={onToggleOpen} style={iconBtn} aria-label="Expand">{open ? <ChevronUp size={16} /> : <ChevronDown size={16} />}</button>
      </div>
      {!isProspect && (
        <div className="flex gap-1 mt-3 flex-wrap">{DEAL_STAGES.map((s, i) => (
          <button key={s} onClick={() => update(x.id, { stage: s })} className="rounded-full px-2.5 py-1" style={{ fontSize: 10.5, cursor: "pointer", fontFamily: "inherit", background: i < idx ? `${tint}14` : x.stage === s ? `${tint}2b` : FILL, border: `1px solid ${x.stage === s ? tint : i < idx ? `${tint}55` : LINE}`, color: x.stage === s ? tint : i < idx ? tint : MUT }}>{i < idx ? "✓ " : ""}{s}</button>
        ))}</div>
      )}
      {(isProspect || x.stage !== "Posted") && <PriorityControls item={x} onChange={(p) => update(x.id, p)} hideDue />}
      <div className="mt-3">
        <Label text="Tasks" />
        <MiniTaskList tasks={x.tasks} onChange={(tasks) => update(x.id, { tasks })} />
      </div>
      {open && (
        <div className="mt-4 flex flex-col gap-3">
          <div style={{ minWidth: 160 }}><Label text="Rate" /><InlineEdit value={x.rate} onChange={(v) => update(x.id, { rate: v })} placeholder="e.g. R6,000" /></div>
          <div><Label text="Caption" /><AutoTextarea value={x.caption} onChange={(v) => update(x.id, { caption: v })} placeholder="Approved caption, hashtags, promo code…" /></div>
          <div><Label text="Posting instructions" /><AutoTextarea value={x.instructions} onChange={(v) => update(x.id, { instructions: v })} placeholder="Collab handle, spark code, whitelisting, tags…" /></div>
          <div><Label text="Notes" /><AutoTextarea value={x.notes} onChange={(v) => update(x.id, { notes: v })} placeholder="Feedback rounds, contacts, anything else…" /></div>
          <button onClick={() => remove(x.id)} className="self-end flex items-center gap-1" style={{ ...iconBtn, fontSize: 12, color: C.rose }}><Trash2 size={12} /> Remove deal</button>
        </div>
      )}
    </div>
  );
}

function ClientCard({ c, updateClient, removeClient }) {
  return (
    <div className="rounded-2xl p-4" style={{ ...card, borderRadius: 16, borderLeft: `3px solid ${CLIENT_TINT[c.status]}` }}>
      <div className="flex items-center gap-2"><div className="flex-1 min-w-0"><InlineEdit value={c.name} onChange={(v) => updateClient(c.id, { name: v })} strong /></div><button onClick={() => removeClient(c.id)} style={iconBtn} aria-label="Delete"><Trash2 size={13} /></button></div>
      <InlineEdit value={c.service} onChange={(v) => updateClient(c.id, { service: v })} placeholder="Service / retainer" dim />
      <div className="flex gap-1 mt-2">{CLIENT_STATUSES.map((s) => (
        <button key={s} onClick={() => updateClient(c.id, { status: s })} className="rounded-full px-3 py-1 flex-1" style={{ fontSize: 11, cursor: "pointer", fontFamily: "inherit", background: c.status === s ? `${CLIENT_TINT[s]}22` : FILL, border: `1px solid ${c.status === s ? CLIENT_TINT[s] : LINE}`, color: c.status === s ? CLIENT_TINT[s] : MUT }}>{s}</button>
      ))}</div>
      <div className="mt-2"><AutoTextarea value={c.notes} onChange={(v) => updateClient(c.id, { notes: v })} placeholder="Notes…" /></div>
      <div className="mt-3">

}

function DealsModule({ data, setData, q, navRequest }) {
  const [openId, setOpenId] = useState(null);
  /* same expand-parent-card behavior as Creators: a dashboard task pointing at a deal (navOpenId)
     opens that deal's card, even though its own Tasks list is already visible either way. */
  useEffect(() => {
    if (navRequest && navRequest.navTab === "deals" && navRequest.navOpenId) setOpenId(navRequest.navOpenId);
  }, [navRequest]);
  const deals = data.deals.deals, clients = data.deals.clients;
  const ql = (q || "").toLowerCase();
  const patch = (p) => setData((d) => ({ ...d, deals: { ...d.deals, ...p } }));
  const update = (id, p) => patch({ deals: deals.map((x) => (x.id === id ? { ...x, ...p } : x)) });
  const remove = (id) => patch({ deals: deals.filter((x) => x.id !== id) });
  const add = (type) => { const x = { id: uid(), brand: "New brand", deliverable: "", stage: "Brief", due: "", rate: "", caption: "", instructions: "", notes: "", aura: Math.floor(Math.random() * AURAS.length), priority: "Medium", lastProgress: null, created: todayISO(), type: type || "Prospect", tasks: [] }; patch({ deals: [x, ...deals] }); setOpenId(x.id); };
  const updateClient = (id, p) => patch({ clients: clients.map((c) => (c.id === id ? { ...c, ...p } : c)) });
  const addClient = () => patch({ clients: [{ id: uid(), name: "New client", service: "", status: "Lead", notes: "", tasks: [] }, ...clients] });
  const removeClient = (id) => patch({ clients: clients.filter((c) => c.id !== id) });

  const matchDeal = (x) => !ql || x.brand.toLowerCase().includes(ql) || (x.deliverable || "").toLowerCase().includes(ql);
  const matchClient = (c) => !ql || c.name.toLowerCase().includes(ql) || (c.service || "").toLowerCase().includes(ql);

  const activeDeals = deals.filter((x) => (x.type || "Active") === "Active" && matchDeal(x))
    .sort((a, b) => { const ap = a.stage === "Posted", bp = b.stage === "Posted"; if (ap !== bp) return ap ? 1 : -1; if (a.due && b.due) return a.due.localeCompare(b.due); return a.due ? -1 : b.due ? 1 : 0; });
  const prospectDeals = deals.filter((x) => (x.type || "Active") === "Prospect" && matchDeal(x));
  const activeClients = clients.filter((c) => c.status !== "Lead" && matchClient(c));
  const prospectClients = clients.filter((c) => c.status === "Lead" && matchClient(c));

  const stageBars = DEAL_STAGES.slice(0, 6).map((s, i) => ({ label: s.split(" ")[0], value: activeDeals.filter((d) => d.stage === s).length, color: AURAS[i % AURAS.length] }));

  return (
    <section>
      <SectionHead title="Brand deals" sub="Split into active (confirmed, in motion) and prospective (still in discussion). Every deal and task here feeds the Priorities dashboard." action={<AddBtn onClick={() => add("Prospect")} label="Add deal" />} />
      {activeDeals.length > 0 && (
        <div className="rounded-2xl p-4 mb-5" style={{ ...card, borderRadius: 18 }}>
          <div style={{ fontSize: 12, letterSpacing: "0.08em", textTransform: "uppercase", color: MUT, marginBottom: 6 }}>Where active deals sit 📊</div>
          <Bars data={stageBars} height={120} />
        </div>
      )}

      <SectionHead title="Active brand deals" sub="Confirmed and in motion." />
      <div className="flex flex-col gap-3 mb-8">
        {activeDeals.map((x) => (
          <DealCard key={x.id} x={x} open={openId === x.id} onToggleOpen={() => setOpenId(openId === x.id ? null : x.id)} update={update} remove={remove} isProspect={false} />
        ))}
        {activeDeals.length === 0 && <Empty text={ql ? "No active deal matches your search." : "No active deals yet. Promote a prospect once it's confirmed."} />}
      </div>

      <SectionHead title="Prospective brand deals" sub="In discussion, nothing solidified yet." action={<AddBtn onClick={() => add("Prospect")} label="Add prospect" />} />
      <div className="flex flex-col gap-3 mb-10">
        {prospectDeals.map((x) => (
          <DealCard key={x.id} x={x} open={openId === x.id} onToggleOpen={() => setOpenId(openId === x.id ? null : x.id)} update={update} remove={remove} isProspect={true} />
        ))}
        {prospectDeals.length === 0 && <Empty text={ql ? "No prospect matches your search." : "No prospects right now. Add one the moment a brand reaches out."} />}
      </div>

      <SectionHead title="Clients" sub="Active retainer or paid SMM work." action={<AddBtn onClick={addClient} label="Add client" />} />
      <div className="grid gap-3 mb-8" style={{ gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))" }}>
        {activeClients.map((c) => <ClientCard key={c.id} c={c} updateClient={updateClient} removeClient={removeClient} />)}
      </div>
      {activeClients.length === 0 && <Empty text={ql ? "No client matches your search." : "No active clients right now. This wakes up when a lead converts."} />}

      <SectionHead title="Prospective clients" sub="Leads and conversations, not yet signed." />
      <div className="grid gap-3" style={{ gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))" }}>
        {prospectClients.map((c) => <ClientCard key={c.id} c={c} updateClient={updateClient} removeClient={removeClient} />)}
      </div>
      {prospectClients.length === 0 && <Empty text={ql ? "No lead matches your search." : "No leads in the pipeline yet."} />}
    </section>
  );
}

function MamaModule({ data, setData, q, navRequest, navigateToTask, completeTask }) {
  const [sub, setSub] = useState("dashboard");

  const subs = [
    { id: "dashboard", emoji: "🎯", label: "Task Dashboard" },
    { id: "creators", emoji: "🧑‍🎤", label: "Creators", count: data.creators.length },
    { id: "tools", emoji: "🛠️", label: "AI Tools", count: data.tools.filter((t) => t.status !== "Shipped").length },
    { id: "adminTasks", emoji: "✅", label: "Admin Tasks", count: openAdminTasks },
    { id: "reports", emoji: "🧾", label: "Reports" },

              <span>{emoji}</span><span>{label}</span>{count !== undefined && <span style={{ fontSize: 11, background: on ? "rgba(11,11,13,0.15)" : FILL2, color: on ? C.canvas : MUT, borderRadius: 99, padding: "1px 7px" }}>{count}</span>}

      {sub === "tools" && <Tools data={data} setData={setData} />}
      {sub === "adminTasks" && <AdminTasks data={data} setData={setData} />}

    </section>

/* Mama's own mini priority dashboard: same ring + Urgent/Medium/Low column pattern as the main
   Hub (PriorityPillarCard), scoped to three buckets instead of the whole app. Creator Tasks pulls
   from every creator's own MiniTaskList, AI Tools Tasks from every tool's, Admin Tasks from the
   generic capture stream — all three already carry due/priority via the shared PriorityControls,
   so computeUrgency + computePillarFillPercent score them exactly like every other pillar. */
function MamaTaskDashboard({ data, setData, setSub, navigateToTask, completeTask }) {
  const creatorTasks = data.creators.flatMap((cr) => (cr.tasks || []).filter((t) => !t.done && !t.paused).map((t) => ({ ...t, ...computeUrgency(t), title: `${t.title} (${cr.name})`, sourceType: "mamaCreator", navTab: "mama", navSub: "creators", navOpenId: cr.id })));
  const toolTasks = data.tools.flatMap((tl) => (tl.tasks || []).filter((t) => !t.done && !t.paused).map((t) => ({ ...t, ...computeUrgency(t), title: `${t.title} (${tl.name})`, sourceType: "mamaTool", navTab: "mama", navSub: "tools", navOpenId: null })));
  const adminTasksList = data.tasks.filter((t) => t.status !== "Done" && !t.paused).map((t) => ({ ...t, ...computeUrgency(t), sourceType: "mamaAdmin", navTab: "mama", navSub: "adminTasks", navOpenId: null }));

  const BUCKETS = [
    { key: "creatorTasks", label: "Creator Tasks", emoji: "🧑‍🎤", accent: C.pink, tasks: creatorTasks, sub: "creators" },
    { key: "toolTasks", label: "AI Tools Tasks", emoji: "🛠️", accent: C.lilac, tasks: toolTasks, sub: "tools" },
    { key: "adminTasksBucket", label: "Admin Tasks", emoji: "✅", accent: C.sky, tasks: adminTasksList, sub: "adminTasks" },
  ];
  const fillPct = Object.fromEntries(BUCKETS.map((b) => [b.key, computePillarFillPercent(b.tasks)]));
  const ranked = [...BUCKETS].sort((a, b) => fillPct[b.key] - fillPct[a.key]);
  const rankOf = Object.fromEntries(ranked.map((b, i) => [b.key, i + 1]));
  const total = creatorTasks.length + toolTasks.length + adminTasksList.length;

  const updateByBucket = {
    creatorTasks: (id, patch) => setData((d) => ({ ...d, creators: d.creators.map((cr) => ({ ...cr, tasks: (cr.tasks || []).map((t) => (t.id === id ? { ...t, ...patch } : t)) })) })),
    toolTasks: (id, patch) => setData((d) => ({ ...d, tools: d.tools.map((tl) => ({ ...tl, tasks: (tl.tasks || []).map((t) => (t.id === id ? { ...t, ...patch } : t)) })) })),
    adminTasksBucket: (id, patch) => setData((d) => ({ ...d, tasks: d.tasks.map((t) => (t.id === id ? { ...t, ...patch } : t)) })),
  };

  return (
    <section>
      <div style={{ marginBottom: 20 }}>
        <h1 style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 700, fontSize: "clamp(24px,4vw,32px)", margin: 0, letterSpacing: "-0.02em" }}>Mama task dashboard 🎯</h1>
        <p style={{ fontSize: 14, color: MUT, margin: "6px 0 0" }}>{total} open item{total === 1 ? "" : "s"} across Creator, AI Tools, and Admin work. Same ring logic as the main Priorities dashboard — tap a ring to open that list.</p>
      </div>
      <div className="grid gap-4" style={{ gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))" }}>
        {ranked.map((b) => (
          <MamaTaskRing key={b.key} label={b.label} emoji={b.emoji} accent={b.accent} tasks={b.tasks} rank={rankOf[b.key]} pct={fillPct[b.key]}
            onNavigate={() => setSub(b.sub)} onDropPriority={(id, priority) => updateByBucket[b.key](id, { priority })}
            onNavigateTask={navigateToTask} onCompleteTask={completeTask} />
        ))}
      </div>
    </section>
  );
}

function MamaTaskRing({ label, emoji, accent, tasks, rank, pct, onNavigate, onDropPriority, onNavigateTask, onCompleteTask }) {
  const cols = ["Urgent", "Medium", "Low"];
  const [dragOverCol, setDragOverCol] = useState(null);
  const tint = urgencyTint(pct);
  const critical = pct > 100;
  const handleDrop = (e, col) => {
    e.preventDefault();
    setDragOverCol(null);
    let payload;
    try { payload = JSON.parse(e.dataTransfer.getData("application/json")); } catch (err) { return; }
    if (!payload || payload.scope !== label) return; // strictly within-card only, same rule as the main dashboard
    onDropPriority(payload.id, DROP_PRIORITY[col]);
  };
  return (
    <div onClick={onNavigate} className="rounded-2xl p-5" style={{ ...card, borderRadius: 18, borderLeft: `4px solid ${accent}`, cursor: "pointer" }}>
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-2 min-w-0">
          <span style={{ width: 28, height: 28, borderRadius: 99, background: accent, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 700, fontSize: 14, flexShrink: 0 }}>{rank}</span>
          <span style={{ fontSize: 17, flexShrink: 0 }}>{emoji}</span>
          <span style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 700, fontSize: 16, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{label}</span>
        </div>
        <ArrowUpRight size={16} color={MUT} />
      </div>
      <div className="flex flex-col items-center text-center" style={{ padding: "6px 0 16px" }}>
        <Ring pct={Math.min(1, pct / 100)} tint={tint} size={148} thick={16} label={`${Math.round(pct)}%`} />
        {critical && <span style={{ fontSize: 10.5, fontWeight: 700, color: C.rose, letterSpacing: "0.03em", marginTop: 10 }}>⚠ CRITICAL — overloaded</span>}
      </div>
      <div className="grid gap-2.5" style={{ gridTemplateColumns: "repeat(3, 1fr)" }}>
        {cols.map((col) => {
          const items = tasks.filter((t) => t.bucket === col).sort((a, b) => b.score - a.score);
          return (
            <div key={col}
              onDragOver={(e) => { e.preventDefault(); if (dragOverCol !== col) setDragOverCol(col); }}
              onDragLeave={() => setDragOverCol((c) => (c === col ? null : c))}
              onDrop={(e) => handleDrop(e, col)}
              style={{ minWidth: 0, borderRadius: 10, padding: 4, margin: -4, background: dragOverCol === col ? `${PRIORITY_COL_TINT[col]}14` : "transparent", outline: dragOverCol === col ? `1px dashed ${PRIORITY_COL_TINT[col]}` : "none", transition: "background 0.1s" }}>
              <div style={{ fontSize: 11, letterSpacing: "0.04em", textTransform: "uppercase", color: PRIORITY_COL_TINT[col], fontWeight: 700, marginBottom: 6 }}>{col} <span style={{ color: MUT, fontWeight: 400 }}>{items.length}</span></div>
              <div className="flex flex-col gap-1.5">
                {items.slice(0, 3).map((t) => (
                  <div key={t.id} draggable onDragStart={(e) => { e.dataTransfer.setData("application/json", JSON.stringify({ id: t.id, scope: label })); e.dataTransfer.effectAllowed = "move"; }}
                    onClick={(e) => e.stopPropagation()} className="rounded-lg px-2 py-1.5 flex items-start gap-1.5"
                    style={{ background: C.soft, border: `1px solid ${LINE}`, borderLeft: `2px solid ${PRIORITY_COL_TINT[col]}`, cursor: "grab" }}>
                    <button onClick={(e) => { e.stopPropagation(); onCompleteTask(t); }} aria-label="Mark complete" title="Mark complete"
                      style={{ width: 14, height: 14, borderRadius: 5, cursor: "pointer", flexShrink: 0, marginTop: 2, padding: 0, background: "transparent", border: `1px solid ${LINE}` }} />
                    <div style={{ flex: 1, minWidth: 0, cursor: "pointer" }} onClick={(e) => { e.stopPropagation(); onNavigateTask(t); }}>
                      <div style={{ fontSize: 12.5, lineHeight: 1.3 }}>{t.title}</div>
                      {t.daysUntilDue !== null && <div style={{ fontSize: 11, color: PRIORITY_COL_TINT[col], marginTop: 2 }}>{t.daysUntilDue < 0 ? `${-t.daysUntilDue}d overdue` : t.daysUntilDue === 0 ? "today" : `${t.daysUntilDue}d`}</div>}
                    </div>
                  </div>
                ))}
                {items.length === 0 && <div style={{ fontSize: 12, color: FAINT, padding: "4px 0" }}>—</div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Creators({ data, setData, q, navRequest }) {
  const [openId, setOpenId] = useState(null);
  /* a task-navigation request targeting a specific creator (navOpenId) expands that creator's
     card — the Tasks list itself is always visible either way, this is just "show me the rest of
     the context too" per the dashboard's expand-parent-card behavior. */
  useEffect(() => {
    if (navRequest && navRequest.navTab === "mama" && navRequest.navSub === "creators" && navRequest.navOpenId) setOpenId(navRequest.navOpenId);
  }, [navRequest]);
  const ql = (q || "").toLowerCase();
  const update = (id, patch) => setData((d) => ({ ...d, creators: d.creators.map((c) => (c.id === id ? { ...c, ...patch } : c)) }));
  const remove = (id) => setData((d) => ({ ...d, creators: d.creators.filter((c) => c.id !== id) }));
  const add = () => { const c = { id: uid(), name: "New creator", niche: "", goals: [], aura: Math.floor(Math.random() * AURAS.length), links: [], notes: [], tasks: [] }; setData((d) => ({ ...d, creators: [c, ...d.creators] })); setOpenId(c.id); };
  let list = data.creators;
  if (ql) list = list.filter((c) => c.name.toLowerCase().includes(ql) || (c.niche || "").toLowerCase().includes(ql));
  return (
    <section>
      <SectionHead title="Creator roster" sub="Everything you know per creator: their goal, your research, the links that matter." action={<AddBtn onClick={add} label="Add creator" />} />
      <div className="grid gap-4" style={{ gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))" }}>
        {list.map((c) => <CreatorCard key={c.id} c={c} open={openId === c.id} onToggle={() => setOpenId(openId === c.id ? null : c.id)} onUpdate={(p) => update(c.id, p)} onRemove={() => remove(c.id)} openTaskCount={(c.tasks || []).filter((t) => !t.done).length} />)}
      </div>
      {list.length === 0 && <Empty text={ql ? "No creator matches your search." : "No creators yet."} />}
    </section>
  );
}

            <div className="mt-2 flex flex-col gap-2" style={{ maxHeight: 220, overflowY: "auto" }}>{c.notes.map((n) => (<div key={n.id} className="rounded-lg px-3 py-2 flex items-start gap-2" style={{ ...cardSoft, borderRadius: 10 }}><div className="flex-1" style={{ fontSize: 13, lineHeight: 1.45 }}>{n.text}<span style={{ fontSize: 10.5, color: FAINT, marginLeft: 8 }}>{n.date}</span></div><button onClick={() => onUpdate({ notes: c.notes.filter((x) => x.id !== n.id) })} style={iconBtn} aria-label="Delete note"><X size={11} /></button></div>))}</div>

/* ---- tasks ---- */
function AdminTasks({ data, setData }) {
  const [title, setTitle] = useState(""); const [description, setDescription] = useState(""); const [source, setSource] = useState("Discord"); const [link, setLink] = useState(""); const [due, setDue] = useState("");
  const add = () => { const t = title.trim(); if (!t) return; setData((d) => ({ ...d, tasks: [{ id: uid(), title: t, description: description.trim(), source, link: link.trim(), status: "To do", created: new Date().toISOString().slice(0, 10), due: due || null, priority: priorityForNewTask(due || null), lastProgress: null }, ...d.tasks] })); setTitle(""); setDescription(""); setLink(""); setDue(""); };
  const advance = (id) => setData((d) => ({ ...d, tasks: d.tasks.map((t) => { if (t.id !== id) return t; const status = TASK_COLS[Math.min(TASK_COLS.indexOf(t.status) + 1, 2)]; return { ...t, status, doneAt: status === "Done" ? Date.now() : t.doneAt }; }) }));
  const back = (id) => setData((d) => ({ ...d, tasks: d.tasks.map((t) => { if (t.id !== id) return t; const status = TASK_COLS[Math.max(TASK_COLS.indexOf(t.status) - 1, 0)]; return { ...t, status, doneAt: status === "Done" ? t.doneAt : null }; }) }));
  const update = (id, p) => setData((d) => ({ ...d, tasks: d.tasks.map((t) => (t.id === id ? { ...t, ...p } : t)) }));
  const remove = (id) => setData((d) => ({ ...d, tasks: d.tasks.filter((t) => t.id !== id) }));
  const clearDone = () => setData((d) => ({ ...d, tasks: d.tasks.filter((t) => t.status !== "Done") }));
  const bars = SOURCES.map((s) => ({ label: s.slice(0, 4), value: data.tasks.filter((t) => t.source === s && t.status !== "Done").length, color: SOURCE_TINT[s] }));
  return (
    <section>
      <SectionHead title="Admin task capture" sub="One place for the strays: Discord pings, Basecamp tags, email asks. Tap a card to move it forward. Tasks tied to a specific creator or AI tool live on their own subtab instead." />
      {data.tasks.some((t) => t.status !== "Done") && (
        <div className="rounded-2xl p-4 mb-5" style={{ ...card, borderRadius: 18 }}><div style={{ fontSize: 12, letterSpacing: "0.08em", textTransform: "uppercase", color: MUT, marginBottom: 6 }}>Open tasks by source 📥</div><Bars data={bars} height={110} /></div>
      )}
      <div className="rounded-2xl p-4 mb-6" style={{ ...card, borderRadius: 16 }}>
        <div className="flex gap-2 flex-wrap mb-3">{SOURCES.map((s) => (<button key={s} onClick={() => setSource(s)} className="rounded-full px-3 py-1" style={{ fontSize: 12, cursor: "pointer", fontFamily: "inherit", background: source === s ? `${SOURCE_TINT[s]}22` : FILL, border: `1px solid ${source === s ? SOURCE_TINT[s] : LINE}`, color: source === s ? SOURCE_TINT[s] : MUT }}>{s}</button>))}</div>
        <div className="flex gap-2 flex-wrap mb-2">
          <input value={title} onChange={(e) => setTitle(e.target.value)} onKeyDown={(e) => e.key === "Enter" && add()} placeholder={`What came in via ${source}?`} className="flex-1 rounded-lg px-3 py-2" style={{ ...inputStyle, minWidth: 200 }} />
          <input value={link} onChange={(e) => setLink(e.target.value)} placeholder="Link (optional)" className="rounded-lg px-3 py-2" style={{ ...inputStyle, width: 160 }} />
          <input type="date" value={due} onChange={(e) => setDue(e.target.value)} className="rounded-lg px-3 py-2" style={{ ...inputStyle, width: 150 }} aria-label="Due date (optional)" title="Due date (optional) — auto-sets the priority" />
        </div>
        <div className="flex gap-2 flex-wrap items-start">
          <GrowingTextarea value={description} onChange={setDescription} placeholder="Description (optional) — what to actually do. Keeps the title short." rows={2} className="flex-1 rounded-lg px-3 py-2" style={{ ...inputStyle, minWidth: 200, lineHeight: 1.45 }} />
          <button onClick={add} style={pillDark}><Plus size={14} style={{ display: "inline", marginRight: 4 }} />Capture</button>
        </div>
      </div>
      <div style={{ borderTop: `1px solid ${LINE}`, margin: "-2px 0 20px" }} />
      <div className="grid gap-4" style={{ gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))" }}>
        {TASK_COLS.map((col) => {
          const items = data.tasks.filter((t) => t.status === col);
          return (
            <div key={col} className="rounded-2xl p-3" style={{ ...cardSoft, borderRadius: 16 }}>
              <div className="flex items-center justify-between mb-3 px-1"><span style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 600, fontSize: 12, letterSpacing: "0.04em", textTransform: "uppercase" }}>{col}</span><span style={{ fontSize: 12, color: MUT }}>{items.length}</span></div>
              <div className="flex flex-col gap-2">
                {items.map((t) => <TaskCard key={t.id} t={t} col={col} onUpdate={(p) => update(t.id, p)} onAdvance={() => advance(t.id)} onBack={() => back(t.id)} onRemove={() => remove(t.id)} />)}
                {items.length === 0 && <div className="rounded-xl p-3 text-center" style={{ border: `1px dashed ${LINE}`, fontSize: 12, color: FAINT, borderRadius: 12 }}>Empty</div>}
              </div>
            </div>
          );
        })}
      </div>
      {data.tasks.some((t) => t.status === "Done") && <button onClick={clearDone} className="mt-4" style={{ ...iconBtn, fontSize: 12 }}>Clear done tasks</button>}
    </section>
  );
}

/* single admin task card: title + description are always visible (description never collapses),
   while source / link have a pencil-toggle edit mode so a mis-logged channel can be corrected
   after the fact without retyping the whole card. No creator tagging here anymore — a task tied
   to a specific creator or AI tool belongs on that creator's/tool's own card instead. */
function TaskCard({ t, col, onUpdate, onAdvance, onBack, onRemove }) {
  const [editing, setEditing] = useState(false);
  const tint = SOURCE_TINT[t.source] || C.lilac;
  return (
    <div data-nav-id={t.id} className="rounded-xl p-3" style={{ ...card, borderRadius: 12, borderLeft: `2px solid ${tint}` }}>

      <div style={{ fontSize: 11.5, color: MUT, marginTop: 2 }}><InlineEdit value={t.description || ""} onChange={(v) => onUpdate({ description: v })} placeholder="Add a description…" /></div>
      {!editing ? (
        <div className="flex items-center gap-2 mt-2 flex-wrap" style={{ fontSize: 11, color: MUT }}>
          <span style={{ color: tint }}>{t.source}</span>{t.link && <a href={t.link.startsWith("http") ? t.link : `https://${t.link}`} target="_blank" rel="noreferrer" style={{ color: C.sky }}><ExternalLink size={11} /></a>}
          <span className="ml-auto flex gap-1">
            <button onClick={() => setEditing(true)} style={iconBtn} aria-label="Edit source, link" title="Edit source, link">✎</button>
            {col !== "To do" && <button onClick={onBack} style={iconBtn} aria-label="Back">←</button>}
            {col !== "Done" && <button onClick={onAdvance} style={{ ...iconBtn, color: C.mint }} aria-label="Forward">→</button>}
            <button onClick={onRemove} style={iconBtn} aria-label="Delete"><X size={12} /></button>
          </span>
        </div>
      ) : (
        <div className="mt-2 flex flex-col gap-2" style={{ fontSize: 11 }}>
          <div className="flex gap-1 flex-wrap">{SOURCES.map((s) => (<button key={s} onClick={() => onUpdate({ source: s })} className="rounded-full px-2.5 py-0.5" style={{ fontSize: 11, cursor: "pointer", fontFamily: "inherit", background: t.source === s ? `${SOURCE_TINT[s]}22` : FILL, border: `1px solid ${t.source === s ? SOURCE_TINT[s] : LINE}`, color: t.source === s ? SOURCE_TINT[s] : MUT }}>{s}</button>))}</div>
          <input value={t.link || ""} onChange={(e) => onUpdate({ link: e.target.value })} placeholder="Link" className="rounded-lg px-2 py-1" style={{ ...inputStyle, fontSize: 11.5 }} />
          <button onClick={() => setEditing(false)} className="self-end" style={{ ...iconBtn, fontSize: 11 }}>Done</button>
        </div>
      )}
      {col !== "Done" && <PriorityControls item={t} onChange={onUpdate} />}
    </div>
  );
}

            <div className="flex items-start justify-between gap-2"><InlineEdit value={t.name} onChange={(v) => update(t.id, { name: v })} strong /><button onClick={() => remove(t.id)} style={iconBtn} aria-label="Delete"><Trash2 size={13} /></button></div>
            <div className="flex gap-1">{TOOL_STAGES.map((s) => (<button key={s} onClick={() => update(t.id, { status: s })} className="rounded-full px-3 py-1 flex-1" style={{ fontSize: 11, cursor: "pointer", fontFamily: "inherit", background: t.status === s ? `${ST[s]}22` : FILL, border: `1px solid ${t.status === s ? ST[s] : LINE}`, color: t.status === s ? ST[s] : MUT }}>{s}</button>))}</div>
            <div><Label text="Description" /><AutoTextarea value={t.problem} onChange={(v) => update(t.id, { problem: v })} placeholder="What does this tool do?" /></div>
            <div><Label text="Next step" /><InlineEdit value={t.next} onChange={(v) => update(t.id, { next: v })} placeholder="The very next action" /></div>
            <div><Label text="Tasks" /><MiniTaskList tasks={t.tasks} onChange={(tasks) => update(t.id, { tasks })} /></div>
          </div>
        ))}
      </div>
      {data.tools.length === 0 && <Empty text="No tools yet." />}
    </section>
  );
}

function Reports({ data, setData }) {
  const mk = monthKey();
  const doneCount = data.reports.filter((r) => r.done.includes(mk)).length, total = data.reports.length, pct = total ? doneCount / total : 0;
  const toggle = (id) => setData((d) => ({ ...d, reports: d.reports.map((r) => r.id === id ? { ...r, done: r.done.includes(mk) ? r.done.filter((m) => m !== mk) : [...r.done, mk] } : r) }));
  const update = (id, patch) => setData((d) => ({ ...d, reports: d.reports.map((r) => (r.id === id ? { ...r, ...patch } : r)) }));
  const add = () => setData((d) => ({ ...d, reports: [...d.reports, { id: uid(), name: "New recurring report", dueDay: 28, done: [], tasks: [] }] }));
  const remove = (id) => setData((d) => ({ ...d, reports: d.reports.filter((r) => r.id !== id) }));
  const today = new Date().getDate();
  return (
    <section>
      <SectionHead title="Recurring reports" sub={`Your ${monthName()} cycle. The ring closes as reports go out.`} action={<AddBtn onClick={add} label="Add report" />} />
      <div className="flex gap-5 flex-wrap items-start">
        <div className="rounded-2xl p-6 flex flex-col items-center" style={{ ...card, borderRadius: 18, minWidth: 170 }}>
          <Ring pct={pct} tint={C.lilac} size={110} thick={11} label={`${doneCount}/${total}`} sub={monthName().slice(0, 3).toUpperCase()} />
        </div>
        <div className="flex-1 flex flex-col gap-3" style={{ minWidth: 280 }}>
          {data.reports.map((r) => { const done = r.done.includes(mk); const overdue = !done && today > r.dueDay; return (
            <div key={r.id} className="rounded-2xl p-4" style={{ ...card, borderRadius: 16, borderLeft: `3px solid ${done ? C.mint : overdue ? C.rose : C.amber}` }}>
              <div className="flex items-center gap-3 flex-wrap">
                <button onClick={() => toggle(r.id)} aria-label="Toggle done" style={{ width: 26, height: 26, borderRadius: 9, cursor: "pointer", flexShrink: 0, background: done ? C.mint : C.card, border: `1px solid ${done ? C.mint : LINE}`, display: "flex", alignItems: "center", justifyContent: "center" }}>{done && <Check size={15} color="#fff" strokeWidth={3} />}</button>
                <div className="flex-1 min-w-0"><InlineEdit value={r.name} onChange={(v) => update(r.id, { name: v })} strong /><div style={{ fontSize: 12, color: overdue ? C.rose : MUT }}>Due day <input type="number" min="1" max="31" value={r.dueDay} onChange={(e) => update(r.id, { dueDay: Math.min(31, Math.max(1, Number(e.target.value) || 1)) })} style={{ ...inputStyle, width: 50, padding: "1px 6px", borderRadius: 6, fontSize: 12, display: "inline-block" }} /> each month{overdue && " · overdue"}{done && ` · done`}</div></div>
                <button onClick={() => remove(r.id)} style={iconBtn} aria-label="Delete"><Trash2 size={13} /></button>
              </div>
              <div className="mt-3"><Label text="Tasks" /><MiniTaskList tasks={r.tasks} onChange={(tasks) => update(r.id, { tasks })} /></div>
            </div>
          ); })}
          {total === 0 && <Empty text="No recurring reports set up." />}
        </div>
      </div>
    </section>
  );
}

/* ================= shared ================= */
const inputStyle = { background: "rgba(255,255,255,0.05)", border: `1px solid ${LINE}`, color: C.ink, fontSize: 13.5, fontFamily: "'Outfit', sans-serif" };
const darkInput = { background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.14)", color: "#fff", fontSize: 13.5, fontFamily: "'Outfit', sans-serif" };
const iconBtn = { background: "transparent", border: "none", color: MUT, cursor: "pointer", padding: 4, borderRadius: 6, fontFamily: "'Outfit', sans-serif" };
const pillDark = { background: "#F2F2F4", color: "#0B0B0D", border: "none", fontWeight: 600, fontSize: 13, borderRadius: 99, padding: "8px 16px", cursor: "pointer", fontFamily: "'Outfit', sans-serif" };
const pillGhost = { background: "transparent", color: C.ink, border: `1px solid ${LINE}`, fontWeight: 500, fontSize: 13, borderRadius: 99, padding: "8px 16px", cursor: "pointer", fontFamily: "'Outfit', sans-serif" };
const pillAccent = (tint) => ({ background: tint, color: onTint(tint), border: "none", fontWeight: 600, fontSize: 13, borderRadius: 10, padding: "8px 16px", cursor: "pointer", fontFamily: "'Outfit', sans-serif" });

function SectionHead({ title, sub, action }) {
  return (
    <div className="flex items-end justify-between gap-3 mb-4 flex-wrap">
      <div><h2 style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 700, fontSize: 27, margin: 0, letterSpacing: "-0.01em" }}>{title}</h2><p style={{ fontSize: 13.5, color: MUT, margin: "5px 0 0", maxWidth: 620 }}>{sub}</p></div>
      {action}
    </div>
  );
}
function AddBtn({ onClick, label }) { return <button onClick={onClick} className="flex items-center gap-1.5" style={pillDark}><Plus size={14} />{label}</button>; }
function Label({ text }) { return <div style={{ fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: MUT, marginBottom: 5 }}>{text}</div>; }
function Empty({ text }) { return <div className="rounded-2xl p-8 text-center mt-2" style={{ border: `1px dashed ${LINE}`, color: MUT, fontSize: 13, borderRadius: 16 }}><Sparkles size={16} style={{ display: "inline", marginBottom: 6, color: FAINT }} /><br />{text}</div>; }
/* every title/field across every pillar goes through this one component, so this is the single
   place that defines how editing works everywhere: double-click (or double-tap) the text to open
   it up, edit, then Enter/click away to save — Escape reverts. Sits as plain text the rest of the
   time so a stray single click/tap (e.g. on a card that also navigates elsewhere) doesn't
   accidentally start an edit. */
function InlineEdit({ value, onChange, placeholder, strong, dim }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value || "");
  const ref = useRef(null);
  useEffect(() => { if (!editing) setDraft(value || ""); }, [value, editing]);
  useEffect(() => { if (editing && ref.current) { ref.current.focus(); ref.current.select(); } }, [editing]);
  const commit = () => { setEditing(false); if (draft !== (value || "")) onChange(draft); };
  const cancel = () => { setDraft(value || ""); setEditing(false); };
  const sharedFont = { color: dim ? MUT : C.ink, fontSize: strong ? 15 : 13, fontWeight: strong ? 600 : 400, fontFamily: "'Outfit', sans-serif" };
  if (editing) {
    return (
      <input ref={ref} value={draft} onChange={(e) => setDraft(e.target.value)} onBlur={commit}
        onClick={(e) => e.stopPropagation()}
        onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); commit(); } else if (e.key === "Escape") { e.preventDefault(); cancel(); } }}
        placeholder={placeholder || ""} className="w-full"
        style={{ ...sharedFont, background: "transparent", border: `1px solid ${C.lilac}`, borderRadius: 6, padding: "2px 4px", margin: "-2px -4px" }} />
    );
  }
  return (
    <div onDoubleClick={(e) => { e.stopPropagation(); setEditing(true); }} title="Double-click to edit" className="w-full"
      style={{ ...sharedFont, color: value ? sharedFont.color : FAINT, border: "1px solid transparent", borderRadius: 6, padding: "2px 4px", margin: "-2px -4px", cursor: "text", minHeight: "1.3em", whiteSpace: "pre-wrap", wordBreak: "break-word" }}>
      {value || placeholder || ""}
    </div>
  );
}
/* free-text description box used across Deals (caption/instructions/notes) and AI Tools
   (description) — auto-grows to fit whatever is typed or pasted in, including a big pasted
   paragraph, instead of staying pinned to a tiny fixed height. A manual collapse/expand toggle
   appears once there's enough text to be worth tucking away, so a long note doesn't have to
   dominate the card once you're done editing it. */
function AutoTextarea({ value, onChange, placeholder }) {
  const [collapsed, setCollapsed] = useState(false);
  const ref = useRef(null);
  /* grows the box to fit whatever's inside it — resized synchronously (useLayoutEffect, so it
     happens before the browser paints, not a tick later) on every value change, AND directly from
     the input event itself (onInput fires on typing, pasting, and cut, before React's own
     onChange/state round-trip even completes) so a big pasted block never has a chance to render
     at the old, tiny height first. Belt and suspenders: either path alone resizes it correctly,
     together they close out any timing gap between "text landed" and "box caught up". */
  const resize = () => {
    const el = ref.current;
    if (!el || collapsed) return;
    el.style.height = "auto";
    el.style.height = el.scrollHeight + "px";
  };
  useLayoutEffect(resize, [value, collapsed]);
  const long = (value || "").length > 120 || (value || "").includes("\n");
  return (
    <div>
      <textarea ref={ref} value={value} onChange={(e) => onChange(e.target.value)} onInput={resize} placeholder={placeholder}
        rows={2} className="w-full rounded-lg px-3 py-2"
        style={{ ...inputStyle, lineHeight: 1.45, resize: "vertical", overflow: collapsed ? "hidden" : "auto", maxHeight: collapsed ? 52 : "none", boxSizing: "border-box", whiteSpace: "pre-wrap", overflowWrap: "break-word" }} />
      {long && (
        <button onClick={() => setCollapsed((v) => !v)} className="flex items-center gap-1 mt-1" style={{ ...iconBtn, padding: 0, fontSize: 10, color: FAINT }}>
          {collapsed ? <ChevronDown size={10} /> : <ChevronUp size={10} />}
          <span>{collapsed ? "Expand" : "Collapse"}</span>
        </button>
      )}
    </div>
  );
}

/* lightweight auto-growing textarea for one-off capture composers — the "Description (optional)"
   fields on Life Admin, Admin Tasks, and every MiniTaskList "add a task" row (Deals, Clients,
   Creators, AI Tools, Reports all share MiniTaskList). These were plain fixed-height, resize-none
   textareas, so pasting anything longer than the box just sat there needing a scroll instead of
   the box growing to show it — this fixes that the same way AutoTextarea does for the bigger
   Caption/Instructions/Notes boxes, minus the collapse toggle (not useful here: these composers
   clear back to empty the moment you hit Add, there's nothing left to want to tuck away). Resizes
   on every keystroke/paste/cut (onInput) and synchronously before paint on every value change
   (useLayoutEffect), so a big paste never renders squashed into the starting row count first. */
function GrowingTextarea({ value, onChange, onKeyDown, placeholder, rows, className, style }) {
  const ref = useRef(null);
  const resize = () => {
    const el = ref.current;
    if (!el) return;
    el.style.height = "auto";
    el.style.height = el.scrollHeight + "px";
  };
  useLayoutEffect(resize, [value]);
  return (
    <textarea ref={ref} value={value} onChange={(e) => onChange(e.target.value)} onInput={resize} onKeyDown={onKeyDown}
      placeholder={placeholder} rows={rows || 1} className={className}
      style={{ ...style, overflow: "hidden", resize: "none", boxSizing: "border-box" }} />
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AllyCRM />);
</script>
