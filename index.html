html,body,#root{height:100%;margin:0;background:#0B0B0D;}
/* dashboard task navigation: brief flash on whatever element scrollAndHighlight() scrolls to,
   so a click on a Priorities/Mama dashboard task chip reads clearly as "here it is" once the
   page lands on the source item. Pure CSS animation on a transient class toggled from JS —
   no React state involved, so it can't be fought by a stray re-render mid-flash. Blinks on/off
   twice over 1s rather than a single fade, so it reads unmistakably as "this one" without
   lingering. */
@keyframes navFlash {
  0%, 50%, 100% { box-shadow: 0 0 0 0 rgba(123,103,224,0); background-color: rgba(123,103,224,0); }
  25%, 75% { box-shadow: 0 0 0 3px rgba(123,103,224,0.9); background-color: rgba(123,103,224,0.18); }
}
.nav-highlight { animation: navFlash 1s steps(1, end); border-radius: 12px; }
</style>

const store = {
  async get(k) {
    if (typeof window !== "undefined" && window.storage && window.storage.get) {
      try { const r = await window.storage.get(k, false); return r ? r.value : null; } catch (e) { return null; }
    }
    try { return localStorage.getItem(k); } catch (e) { return null; }
  },
  async set(k, v) {
    if (typeof window !== "undefined" && window.storage && window.storage.set) {
      try { await window.storage.set(k, v, false); return; } catch (e) {}
    }
    try { localStorage.setItem(k, v); } catch (e) {}
  },
};

/* ---------- priority engine: shared urgency scoring across all 6 pillars ---------- */
const PRIORITY_LEVELS = ["Low", "Medium", "High"];
const PRIORITY_WEIGHT = { Low: 1, Medium: 2, High: 3 };
const PRIORITY_TINT = { Low: C.sky, Medium: C.amber, High: C.rose };

/* single source of truth for "how urgent is this due date" — one set of day bands, reused
   for the Urgent/Medium/Low bucket (the 3 columns on each pillar's card, and sort order within
   them) and the auto-escalation to High priority (priorityFromDueDate/PriorityControls):
     - due today or overdue   -> guarantees Urgent (the discrete columns have no bucket above
       Urgent, there's no separate "LATE/critical" bucket, just the Urgent column itself)
     - due in 1-3 days        -> guarantees at least Medium, regardless of priority
     - due in 4+ days (or no due date at all) -> the calendar stops forcing anything; priority
       and stalled-progress alone decide the bucket, same as always
   The due-date signal DOMINATES rather than stacking with priority (max, not addition) — a
   deadline is pass/fail, so priority can only push urgency up from there, never override a close
   deadline down.
   Note this only feeds the bucket/score used for sorting within a pillar's card, not the ring's
   fill % anymore — that's taskFillPercent below, which reads the priority label alone (which this
   day-band logic already sets automatically) rather than adding its own separate, bigger number on
   top. The two used to double up, which is how a couple of due-today tasks could read as 300%+.
   Does not apply to Content, which has its own separate days-since-last-post urgency model
   (computeContentUrgency) untouched by any of this. */
function dueBandScore(daysUntilDue) {
  if (daysUntilDue === null || daysUntilDue === undefined) return 0;
  if (daysUntilDue <= 0) return 4.2; // today or overdue
  if (daysUntilDue <= 3) return 2.2; // due in 1-3 days
  return 0; // 4+ days out: no calendar override, priority/stall decide
}

/* how hard silence pushes urgency up: no logged progress, scaled to how much runway is left */
function stallUrgency(daysSinceProgress, daysUntilDue) {
  if (daysSinceProgress === null) return 0;
  const runway = daysUntilDue === null ? 14 : Math.max(daysUntilDue + daysSinceProgress, 1);
  const ratio = daysSinceProgress / runway;
  if (ratio >= 0.66) return 1.2;
  if (ratio >= 0.4) return 0.6;
  return 0;
}

/* score + bucket for one item shaped like { due, priority, lastProgress, created } */
function computeUrgency(item) {
  const base = PRIORITY_WEIGHT[item.priority] || PRIORITY_WEIGHT.Medium;
  const dUntil = item.due ? daysUntil(item.due) : null;
  const touch = item.lastProgress || item.created || null;
  const dSince = touch ? daysSince(touch) : null;
  const score = Math.max(base, dueBandScore(dUntil)) + stallUrgency(dSince, dUntil);
  const bucket = score >= 4.2 ? "Urgent" : score >= 2.2 ? "Medium" : "Low";
  return { score: Math.round(score * 10) / 10, bucket, daysUntilDue: dUntil, daysSinceProgress: dSince };
}

/* content's ring has two stacked weightings, not just one. The base signal is still the whole
   pillar's days-since-last-post, full stop — 1 day since post = 33% full, 3 days = 100%, and it
   keeps climbing past that into an overflow/critical state if you let it run, exactly as before.
   It still does not care what's sitting in the pipeline (Ideas/To Film/In Edit are for your own
   tracking only). On top of that base, though, any individual idea that's due today or overdue
   adds the same "High priority" weighting (PRIORITY_BASE_PCT.High, 20%) used everywhere else in
   the app, once per dated idea — this is additive (summed), not the max()-picks-one-signal rule
   the other pillars use, since a looming deadline should make an already-overdue pillar read as
   even more urgent rather than being silently absorbed by it. Ideas due later than today (1+ days
   out) don't add anything here; they still show on the hub's "Upcoming deadlines" list, they just
   don't inflate this ring until the day arrives. Every open content piece still inherits this same
   score/bucket, so individual ideas never compete with each other on "urgency". */
function computeContentUrgency(content) {
  const since = daysSince(content.lastPosted);
  const basePct = since === null ? 40 : since * 33;
  const dueTodayBonus = (content.items || []).filter((i) => i.due && !i.filmed && daysUntil(i.due) <= 0).length * PRIORITY_BASE_PCT.High;
  const pct = basePct + dueTodayBonus;
  const bucket = pct > 80 ? "Urgent" : pct >= 40 ? "Medium" : "Low";
  const score = Math.round((1 + (Math.min(pct, 100) / 100) * 5) * 10) / 10;
  return { score, bucket, pct, since };
}

/* every pillar gets its own independent fill ring now — no more competing for a shared 100%.
   Same color banding everywhere so the colors mean the same thing on every card: 0-19% calm (blue),
   20-40% fine (green), 41-80% building up (orange), 81-100%+ needs you today (red). Past 100% is a
   critical/overflow state — the ring caps visually at a full loop but the number keeps climbing. */
function urgencyTint(pct) {
  if (pct >= 81) return C.rose;
  if (pct >= 41) return C.amber;
  if (pct >= 20) return C.mint;
  return C.sky;
}

/* non-content pillars: each task contributes its own fill % based on priority label alone —
   Low 10% / Medium 15% / High 25%. A due date doesn't add a second, bigger number on top of that
   anymore (it used to: due-today alone used to contribute 100%, which is how 2 things due today +
   3 things due tomorrow could read as 350%, an obviously broken number). Since a due date already
   drives the priority label automatically (today/overdue -> High, 1-3 days -> Medium, 4+ days ->
   whatever priority you've set, see priorityFromDueDate/PriorityControls), the label alone already
   reflects urgency — no need for a second competing signal. Contributions still sum across every
   open task, uncapped, so a genuinely busy day (several urgent + several medium things at once)
   reads high, realistically landing in the 80s-90s rather than needing to be literally impossible
   to end up looking silly. A pillar that's truly overloaded still reads past 100%, that's intentional
   (it's meant to look like "more than a full day"), it just takes a lot more piled up to get there
   now instead of two or three items alone doing it. */
const PRIORITY_BASE_PCT = { Low: 10, Medium: 15, High: 25 };
function taskFillPercent(t) {
  return PRIORITY_BASE_PCT[t.priority] || PRIORITY_BASE_PCT.Medium;
}
function computePillarFillPercent(tasks) {
  return tasks.reduce((s, t) => s + taskFillPercent(t), 0);
}

/* ================= CHARTS ================= */
function Ring({ pct, tint, size = 66, thick = 8, label, sub }) {
  const r = (size - thick) / 2, c = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} role="img" aria-label={label ? `${label} ${sub || ""}` : `${Math.round(pct * 100)} percent`} style={{ flexShrink: 0 }}>
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="rgba(28,28,34,0.08)" strokeWidth={thick} />
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={tint} strokeWidth={thick} strokeLinecap="round"
        strokeDasharray={c} strokeDashoffset={c * (1 - Math.min(1, pct))} transform={`rotate(-90 ${size / 2} ${size / 2})`} style={{ transition: "stroke-dashoffset 0.6s ease" }} />
      {label !== undefined && <text x={size / 2} y={sub ? size / 2 - size * 0.09 : size / 2} textAnchor="middle" dominantBaseline="central" fill={C.ink} style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontSize: size * 0.24, fontWeight: 700 }}>{label}</text>}
      {sub && <text x={size / 2} y={size / 2 + size * 0.17} textAnchor="middle" dominantBaseline="central" fill={MUT} style={{ fontSize: size * 0.11, letterSpacing: "0.06em" }}>{sub}</text>}
    </svg>
  );
}

function Donut({ segments, size = 150, thick = 20, centerTop, centerSub }) {
  const r = (size - thick) / 2, c = 2 * Math.PI * r;
  const total = segments.reduce((s, x) => s + x.value, 0) || 1;
  let off = 0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} role="img" aria-label="distribution donut chart">
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="rgba(28,28,34,0.06)" strokeWidth={thick} />
      {segments.map((seg, i) => {
        const frac = seg.value / total, dash = frac * c;
        const el = <circle key={i} cx={size / 2} cy={size / 2} r={r} fill="none" stroke={seg.color} strokeWidth={thick}
          strokeDasharray={`${dash} ${c - dash}`} strokeDashoffset={-off} transform={`rotate(-90 ${size / 2} ${size / 2})`} style={{ transition: "stroke-dasharray 0.5s ease" }} />;
        off += dash; return el;
      })}
      {centerTop !== undefined && <text x={size / 2} y={centerSub ? size / 2 - size * 0.07 : size / 2} textAnchor="middle" dominantBaseline="central" fill={C.ink} style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontSize: size * 0.2, fontWeight: 700 }}>{centerTop}</text>}
      {centerSub && <text x={size / 2} y={size / 2 + size * 0.15} textAnchor="middle" dominantBaseline="central" fill={MUT} style={{ fontSize: size * 0.075, letterSpacing: "0.08em", textTransform: "uppercase" }}>{centerSub}</text>}
    </svg>
  );
}

function Bars({ data, height = 130 }) {
  const max = Math.max(...data.map((d) => d.value), 1);
  return (
    <div className="flex items-end justify-between gap-2" style={{ height }}>
      {data.map((d, i) => (
        <div key={i} className="flex flex-col items-center gap-1.5" style={{ flex: 1, height: "100%", justifyContent: "flex-end" }}>
          <span style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontSize: 13, fontWeight: 700, color: d.value ? C.ink : FAINT }}>{d.value}</span>
          <div style={{ width: "100%", maxWidth: 34, height: `${(d.value / max) * (height - 44)}px`, minHeight: 4, borderRadius: 8, background: d.color, transition: "height 0.5s ease" }} />
          <span style={{ fontSize: 10.5, color: MUT, textAlign: "center", lineHeight: 1.1 }}>{d.label}</span>
        </div>
      ))}
    </div>
  );
}

function Bar({ pct, tint }) {
  return (
    <div style={{ height: 8, borderRadius: 99, background: "rgba(28,28,34,0.07)", overflow: "hidden" }}>
      <div style={{ height: "100%", width: `${Math.min(100, Math.round(pct * 100))}%`, borderRadius: 99, background: tint, transition: "width 0.5s ease" }} />
    </div>
  );
}

    catch (e) { /* popup closed/blocked — nothing to surface, user can just try again */ }
  };
  const signOutGoogle = async () => {
    if (!fbAuth) return;
    try { await fbAuth.signOut(); } catch (e) {}
    cloudLoadedFor.current = null; reconcileDone.current = false; setCloudState("offline"); setUser(null);
  };

  /* one-time cleanup helper: wipes this browser's local cache of ally/mama data. Only ever used
     from the signed-out gate screen below, as a manual "tidy up the stale copy" action — Firestore
     is untouched, and the app reloads clean right after (nothing to display, since we're signed out). */
  const clearLocalCache = () => {
    if (!window.confirm("This clears the copy of your data saved in this browser only. Your Google account's cloud copy in Firestore is not touched. Continue?")) return;
    try { localStorage.removeItem(ALLY_KEY); localStorage.removeItem(MAMA_KEY); } catch (e) {}
    window.location.reload();

  /* one-time reconcile the moment we know who's signed in AND local data has finished loading:

  useEffect(() => {
    if (!fbDb || !user || !localLoaded) return;

    cloudLoadedFor.current = user.uid;
    reconcileDone.current = false;
    (async () => {
      setCloudState("loading");
      try {
        const docRef = fbDb.collection("users").doc(user.uid);

        const remote = snap.exists ? snap.data() : null;

        }
        setCloudState("synced");
      } catch (e) {
        setCloudState("error");

  useEffect(() => {
    if (!fbDb || !user || !reconcileDone.current) return;
    setCloudState("saving"); clearTimeout(cloudTimer.current);
    cloudTimer.current = setTimeout(async () => {

      }, 250);
      return () => clearTimeout(timers.current[key]);
    }, [data]);
  };
  useSave(ALLY_KEY, ally);
  useSave(MAMA_KEY, mama);

  /* safety net: any edit (priority, status, whatever) must survive a fast tab-switch or refresh,
     so flush straight to localStorage the instant the tab is hidden/closed, bypassing the debounce. */
  useEffect(() => {
    const flush = () => {
      if (!loaded.current) return;
      try { if (ally) localStorage.setItem(ALLY_KEY, JSON.stringify(ally)); } catch (e) {}
      try { if (mama) localStorage.setItem(MAMA_KEY, JSON.stringify(mama)); } catch (e) {}
    };
    const onVis = () => { if (document.visibilityState === "hidden") flush(); };
    document.addEventListener("visibilitychange", onVis);
    window.addEventListener("pagehide", flush);
    window.addEventListener("beforeunload", flush);
    return () => {
      document.removeEventListener("visibilitychange", onVis);
      window.removeEventListener("pagehide", flush);
      window.removeEventListener("beforeunload", flush);
    };
  }, [ally, mama]);


  /* auto-clean: anything marked Done (Admin Tasks / Life Admin's kanban) or checked off (the
     MiniTaskList "done" toggle used under Creators/AI Tools/Reports/Deals/Clients) gets removed
     12 hours after it was completed, using the doneAt timestamp stamped on it the moment it was
     marked done. Runs once shortly after load (catching data that was already stale when you
     opened the app) and then rechecks periodically while the tab stays open — no need to be
     precise to the minute, this is just tidying, not anything the priority engine depends on
     (completed items are already excluded from collectPriorityTasks regardless of how long they
     linger). Items with no doneAt (older data from before this existed) are left alone rather
     than guessed at.
     Scope: this only touches actual disposable to-do lists (Admin Tasks, Life Admin, and the
     MiniTaskList sub-tasks under Creators/AI Tools/Reports/Deals/Clients). It does NOT touch
     Content (Posted ideas stay until you hit "Clear posted archive"), Song stages, the Deals
     pipeline itself (a deal reaching "Posted" is a history record, not deleted), Apartment
     ("Bought" items), or Unlocks — those are milestones/records, not disposable tasks, and keep
     their existing manual-clear-only behavior. */
  useEffect(() => {
    const STALE_MS = 12 * 60 * 60 * 1000;
    const stale = (t) => !!t.doneAt && Date.now() - t.doneAt > STALE_MS;
    const sweep = () => {
      if (!loaded.current) return;
      const a = allyRef.current, m = mamaRef.current;
      if (!a || !m) return;

      let aChanged = false;
      const lifeAdminItems = a.lifeAdmin.items.filter((t) => !(t.status === "Done" && stale(t)));
      if (lifeAdminItems.length !== a.lifeAdmin.items.length) aChanged = true;
      const dealsDeals = a.deals.deals.map((d) => {
        const tasks = (d.tasks || []).filter((t) => !(t.done && stale(t)));
        if (tasks.length !== (d.tasks || []).length) aChanged = true;
        return tasks.length !== (d.tasks || []).length ? { ...d, tasks } : d;
      });
      const dealsClients = a.deals.clients.map((cl) => {
        const tasks = (cl.tasks || []).filter((t) => !(t.done && stale(t)));
        if (tasks.length !== (cl.tasks || []).length) aChanged = true;
        return tasks.length !== (cl.tasks || []).length ? { ...cl, tasks } : cl;
      });
      if (aChanged) setAlly((prev) => ({ ...prev, lifeAdmin: { ...prev.lifeAdmin, items: lifeAdminItems }, deals: { ...prev.deals, deals: dealsDeals, clients: dealsClients } }));

      let mChanged = false;
      const adminTasks = m.tasks.filter((t) => !(t.status === "Done" && stale(t)));
      if (adminTasks.length !== m.tasks.length) mChanged = true;
      const creators = m.creators.map((cr) => {
        const tasks = (cr.tasks || []).filter((t) => !(t.done && stale(t)));
        if (tasks.length !== (cr.tasks || []).length) mChanged = true;
        return tasks.length !== (cr.tasks || []).length ? { ...cr, tasks } : cr;
      });
      const tools = m.tools.map((tl) => {
        const tasks = (tl.tasks || []).filter((t) => !(t.done && stale(t)));
        if (tasks.length !== (tl.tasks || []).length) mChanged = true;
        return tasks.length !== (tl.tasks || []).length ? { ...tl, tasks } : tl;
      });
      const reports = m.reports.map((rp) => {
        const tasks = (rp.tasks || []).filter((t) => !(t.done && stale(t)));
        if (tasks.length !== (rp.tasks || []).length) mChanged = true;
        return tasks.length !== (rp.tasks || []).length ? { ...rp, tasks } : rp;
      });
      if (mChanged) setMama((prev) => ({ ...prev, tasks: adminTasks, creators, tools, reports }));
    };
    const kickoff = setTimeout(sweep, 4000);
    const id = setInterval(sweep, 15 * 60 * 1000);
    return () => { clearTimeout(kickoff); clearInterval(id); };
  }, []);

  const go = (next) => { setNavOpen(false); if (next === tab) return; setHistory((h) => [...h, tab].slice(-20)); setTab(next); setQ(""); };
  const back = () => { setHistory((h) => { if (!h.length) return h; const prev = h[h.length - 1]; setTab(prev); setQ(""); return h.slice(0, -1); }); };

  /* ---------- dashboard task navigation hub: turns the Priorities/Mama hub cards into a
     navigation surface. navigateToTask switches to the task's tab (via go, a no-op if already
     there), then stamps navRequest with a fresh seq so downstream modules (MamaModule's subtab
     switch, Creators'/DealsModule's expand-card effect) and scrollAndHighlight all re-fire even
     if the same task is clicked twice in a row. completeTask ticks the checkbox: it patches the
     underlying record via completePriorityTask, which reuses each pillar's own "done" mechanism,
     so the source tab and every ring/percentage derived from it update immediately. */
  const navSeq = useRef(0);
  const [navRequest, setNavRequest] = useState(null);
  const navigateToTask = (task) => {
    if (!task || !task.navTab) return;
    go(task.navTab);
    navSeq.current += 1;
    setNavRequest({ id: task.id, navTab: task.navTab, navSub: task.navSub || null, navOpenId: task.navOpenId || null, seq: navSeq.current });
  };
  const completeTask = (task) => completePriorityTask(setAlly, setMama, task);
  /* the Mama rail icon always lands on Mama's own Task Dashboard, even if you're already sitting
     on the Mama tab on some other subtab (Creators, Tools...) — go() alone can't do this since it
     no-ops when you're already on that tab, and MamaModule's subtab is its own local state that
     only resets on a fresh mount. Routing this through the same navRequest channel forces
     MamaModule's subtab-switch effect to fire regardless of whether the tab itself changed. */
  const goMamaDashboard = () => {
    go("mama");
    navSeq.current += 1;
    setNavRequest({ id: null, navTab: "mama", navSub: "dashboard", navOpenId: null, seq: navSeq.current });
  };
  useEffect(() => {
    if (!navRequest) return;
    if (navRequest.id) scrollAndHighlight(navRequest.id);
    /* self-clears a couple seconds after landing so a stale request (e.g. "jump to Creators")
       can never leak into a later, unrelated remount of the same module and hijack its default
       subtab — without this, switching away from Mama and back in via the plain rail click could
       reopen whatever subtab the last dashboard-task click happened to target. */
    const t = setTimeout(() => setNavRequest(null), 1400);
    return () => clearTimeout(t);
  }, [navRequest]);

  /* export/import: localStorage is per-browser (Chrome and Safari, or a Safari "Add to Dock" web
     app, each keep their own completely separate copy) so this is how data actually moves between
     them — download everything as one JSON file here, then use Import on the other browser/app. */
  const [importMsg, setImportMsg] = useState("");
  const importInputRef = useRef(null);
  const exportData = () => {
    const blob = new Blob([JSON.stringify({ ally, mama, exportedAt: todayISO() }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `ally-crm-backup-${todayISO()}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };
  const triggerImport = () => importInputRef.current && importInputRef.current.click();
  const handleImportFile = (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!parsed || typeof parsed !== "object" || !parsed.ally || !parsed.mama) throw new Error("bad shape");
        if (!window.confirm("This replaces everything currently in this browser with the imported backup. Continue?")) return;
        setAlly(parsed.ally); setMama(parsed.mama);
        setImportMsg("Imported ✓"); setTimeout(() => setImportMsg(""), 2500);
      } catch (err) {
        setImportMsg("Invalid file"); setTimeout(() => setImportMsg(""), 2500);
      }
    };
    reader.readAsText(file);
  };

  if (!ally || !mama) {
    return <div style={{ background: C.canvas, minHeight: "100vh" }} className="flex items-center justify-center"><div style={{ color: MUT, fontFamily: "Outfit, sans-serif" }}>Opening ALLY CRM…</div></div>;
  }

  /* auth gate: if cloud sync is available (fbAuth loaded), don't render the app — or any locally
     cached data — until we actually know the sign-in state. Signed out (or still checking) shows a
     dedicated screen instead of ever flashing whatever's sitting in this browser's localStorage. */
  if (fbAuth && !authReady) {
    return <div style={{ background: C.canvas, minHeight: "100vh" }} className="flex items-center justify-center"><div style={{ color: MUT, fontFamily: "Outfit, sans-serif" }}>Checking sign-in…</div></div>;
  }
  if (fbAuth && authReady && !user) {
    return (
      <div style={{ background: C.canvas, minHeight: "100vh" }} className="flex items-center justify-center">
        <div className="flex flex-col items-center" style={{ ...card, borderRadius: 20, padding: "40px 36px", width: 340, textAlign: "center" }}>
          <div style={{ width: 148, height: 148, borderRadius: 28, overflow: "hidden", marginBottom: 20 }}><img src={AVATAR_IMG} alt="Ally Damon" style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} /></div>
          <div style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 800, fontStyle: "italic", fontSize: 26, letterSpacing: "0.04em", color: "#E6090F", textTransform: "uppercase", marginBottom: 6 }}>ALLY CRM</div>
          <div style={{ fontSize: 12.5, color: MUT, marginBottom: 24 }}>Sign in with Google to continue</div>
          <button onClick={signInGoogle} className="flex items-center justify-center gap-2 w-full" style={{ ...pillDark, padding: "11px 16px", fontSize: 14 }}>
            <CloudIcon size={15} /> Sign in with Google
          </button>
        </div>
      </div>
    );
  }

  const aptUnlocked = isApartmentUnlocked(ally);
  /* sidebar badge counts: for the 4 pillars that feed the Priorities dashboard (song, unlocks,
     deals, mama), pull the count from the exact same collectPriorityTasks pool the dashboard uses —
     that's every open task from every source for that pillar (e.g. Mama's badge used to only count
     the top-level captured-tasks board and miss anything logged under Creators/AI Tools/Reports;
     Deals only counted open deal records and missed deal/client sub-task checklists). Now every
     tab's badge means the same thing: how much open, non-paused work is sitting in that pillar. */
  const priorityTaskCounts = (() => {
    const tasks = collectPriorityTasks(ally, mama);
    return Object.fromEntries(PRIORITY_PILLARS.map((k) => [k, tasks.filter((t) => t.pillar === k).length]));
  })();
  const badges = {
    content: priorityTaskCounts.content,
    song: ally.song.stages.filter((s) => s.status !== "done" && !s.paused).length,
    unlocks: priorityTaskCounts.unlocks,
    apartment: aptUnlocked ? ally.apartment.items.filter((i) => i.status === "Bought").length : null,
    lifeAdmin: priorityTaskCounts.lifeAdmin,
    deals: priorityTaskCounts.deals,
    mama: priorityTaskCounts.mama,
  };
  const mod = MODULES[tab];

  return (
    <div style={{ background: C.canvas, height: "100vh", overflow: "hidden", color: C.ink }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Outfit:wght@300;400;500;600&display=swap');
        * { box-sizing: border-box; }
        html, body { background: ${C.canvas}; }
        ::placeholder { color: ${FAINT}; }
        input, textarea, select { outline: none; }
        input:focus, textarea:focus { border-color: ${C.lilac} !important; }
        .script-editable { outline: none; }
        .script-editable:focus { border-color: ${C.lilac} !important; }
        .script-editable:empty:before { content: attr(data-placeholder); color: ${FAINT}; }
        .script-editable * { background: transparent !important; color: inherit !important; }
        button:focus-visible { outline: 2px solid ${C.lilac}; outline-offset: 2px; }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.5; filter: invert(1); }
        .scroll::-webkit-scrollbar { width: 9px; }
        .scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 99px; }
        @media (prefers-reduced-motion: reduce) { .pulse-dot { animation: none !important; } }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .pulse-dot { animation: pulse 2s ease-in-out infinite; }
        .railbtn:hover { background: ${FILL} !important; }

        /* ---------- mobile layout: hamburger sidebar + header collapse ---------- */
        .hamburger-btn { display: none; }
        .rail-label { display: none; }
        @media (max-width: 768px) {
          .hamburger-btn { display: flex !important; }
          .sidebar-rail {
            position: fixed !important;
            top: 0; left: 0;
            height: 100dvh !important;
            width: 250px !important;
            z-index: 60;
            transform: translateX(-100%);
            transition: transform 0.22s ease;
            box-shadow: 4px 0 30px rgba(0,0,0,0.55);
            align-items: stretch !important;
            padding: 18px 12px !important;
          }
          .sidebar-rail.nav-open { transform: translateX(0); }
          .sidebar-rail .railbtn {
            width: 100% !important;
            height: auto !important;
            flex-direction: row !important;
            justify-content: flex-start !important;
            gap: 14px;
            padding: 11px 12px !important;
            font-size: 24px !important;
          }
          .sidebar-rail .rail-label { display: inline-block; font-size: 14.5px; font-weight: 600; font-family: 'Outfit', sans-serif; }
          .sidebar-rail .rail-logo, .sidebar-rail .rail-avatar { align-self: center; }
          .app-header { padding: 10px 14px !important; flex-wrap: wrap; row-gap: 8px; }
          .header-search { display: none !important; }
          .header-savestate { display: none !important; }
          .page-subtitle { display: none !important; }
          .page-title { font-size: 17px !important; }
          .btn-label { display: none; }
          .scroll { padding: 16px 14px !important; }
        }
      `}</style>

      <div className="flex" style={{ height: "100%", fontFamily: "'Outfit', sans-serif", color: C.ink }}>

        {/* mobile-only backdrop behind the drawer; only ever mountable via the hamburger button,
            which itself only renders (via CSS) below the 768px breakpoint */}
        {navOpen && <div onClick={() => setNavOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", zIndex: 55 }} />}

        {/* ===== sidebar rail (fixed, does not scroll with page content).
            Desktop: static icon rail. Mobile (<=768px, see .sidebar-rail CSS): becomes a fixed,
            off-canvas drawer that slides in from the left when navOpen, with icon+label rows. ===== */}
        <aside className={`flex flex-col items-center sidebar-rail${navOpen ? " nav-open" : ""}`} style={{ width: 104, flexShrink: 0, borderRight: `1px solid ${LINE}`, padding: "22px 0", gap: 8, background: "#0E0E11", height: "100%", overflowY: "auto" }}>
          {TAB_ORDER.map((t) => {
            const on = tab === t; const info = MODULES[t];
            const locked = t === "apartment" && !aptUnlocked;
            return (
              <button key={t} className="railbtn" onClick={() => (t === "mama" ? goMamaDashboard() : go(t))} title={info.label} aria-label={info.label}
                style={{ width: 68, height: 68, borderRadius: 16, border: on ? `1px solid ${LINE}` : "1px solid transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", position: "relative",
                  background: on ? "rgba(255,255,255,0.1)" : "transparent", fontSize: 32, transition: "background 0.15s" }}>
                <span style={{ filter: on ? "none" : "saturate(0.85)", opacity: locked ? 0.4 : on ? 1 : 0.7 }}>{info.emoji}</span>
                <span className="rail-label">{info.label}</span>
                {locked && <span style={{ position: "absolute", top: 6, right: 8, fontSize: 11 }}>🔒</span>}
                {badges[t] ? <span style={{ position: "absolute", top: 5, right: 5, minWidth: 18, height: 18, borderRadius: 99, background: info.accent, color: "#fff", fontSize: 10.5, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", padding: "0 5px" }}>{badges[t]}</span> : null}
              </button>
            );
          })}
          <div style={{ flex: 1 }} />
          <div className="rail-avatar" style={{ width: 48, height: 48, borderRadius: 99, overflow: "hidden" }} title="Ally"><img src={AVATAR_IMG} alt="Ally" style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} /></div>
        </aside>

        {/* ===== main column ===== */}
        <div className="flex flex-col" style={{ flex: 1, minWidth: 0, height: "100%" }}>
          {/* top bar (persistent) */}
          <header className="flex items-center gap-3 app-header" style={{ padding: "14px 24px", borderBottom: `1px solid ${LINE}`, flexShrink: 0 }}>
            <button onClick={() => setNavOpen(true)} className="hamburger-btn" aria-label="Open menu"
              style={{ width: 32, height: 32, borderRadius: 9, border: `1px solid ${LINE}`, background: C.card, cursor: "pointer", alignItems: "center", justifyContent: "center", color: C.ink, flexShrink: 0 }}>
              <MenuIcon size={16} />
            </button>
            <button onClick={back} disabled={!history.length} aria-label="Back"
              style={{ width: 32, height: 32, borderRadius: 9, border: `1px solid ${LINE}`, background: history.length ? C.card : "transparent", cursor: history.length ? "pointer" : "default", display: "flex", alignItems: "center", justifyContent: "center", color: history.length ? C.ink : FAINT, flexShrink: 0 }}>
              <ChevronLeft size={16} />
            </button>
            <div style={{ width: 36, height: 36, borderRadius: 10, background: mod.bg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 17, flexShrink: 0 }}>{mod.emoji}</div>
            <div style={{ minWidth: 0 }}>
              <div className="page-title" style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 700, fontSize: 21, lineHeight: 1.1, letterSpacing: "-0.01em" }}>{mod.label}</div>
              <div className="page-subtitle" style={{ fontSize: 10.5, color: MUT }}>{new Date().toLocaleDateString("en-ZA", { weekday: "long", day: "numeric", month: "long" })}</div>
            </div>
            <div className="flex-1" />
            <div className="flex items-center gap-2 header-search" style={{ background: "rgba(255,255,255,0.04)", border: `1px solid ${LINE}`, borderRadius: 9, padding: "6px 10px", maxWidth: 220, flex: "1 1 140px" }}>
              <Search size={13} color={MUT} />
              <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search this page…" style={{ background: "transparent", border: "none", fontSize: 12.5, color: C.ink, width: "100%", fontFamily: "inherit" }} />
              {q && <button onClick={() => setQ("")} style={{ ...iconBtn, padding: 0 }} aria-label="Clear"><X size={12} /></button>}
            </div>
            <div className="header-savestate" style={{ fontSize: 10.5, color: saveState === "error" ? C.rose : FAINT, minWidth: 42, textAlign: "right" }}>
              {saveState === "saving" ? "saving…" : saveState === "saved" ? "saved ✓" : saveState === "error" ? "retry" : ""}
            </div>
            {fbAuth && (
              <div className="flex items-center gap-1.5">
                {!user ? (
                  <button onClick={signInGoogle} className="flex items-center gap-1" style={{ ...iconBtn, fontSize: 11, padding: "5px 8px", border: `1px solid ${LINE}`, borderRadius: 8 }} title="Sign in with Google to sync this data across your devices">
                    <CloudIcon size={12} /> <span className="btn-label">Sign in</span>
                  </button>
                ) : (
                  <div className="flex items-center gap-1.5" title={`Signed in as ${user.email}`}>
                    {user.photoURL ? <img src={user.photoURL} alt="" style={{ width: 20, height: 20, borderRadius: 99 }} /> : <CloudIcon size={12} color={MUT} />}
                    <span className="btn-label" style={{ fontSize: 10.5, color: cloudState === "error" ? C.rose : MUT, whiteSpace: "nowrap" }}>
                      {cloudState === "saving" ? "syncing…" : cloudState === "synced" ? "synced ✓" : cloudState === "loading" ? "loading…" : cloudState === "error" ? "sync error" : ""}
                    </span>
                    <button onClick={signOutGoogle} style={{ ...iconBtn, fontSize: 11, padding: "5px 8px", border: `1px solid ${LINE}`, borderRadius: 8 }}><span className="btn-label">Sign out</span></button>
                  </div>
                )}
              </div>
            )}
            <div className="flex items-center gap-1.5" title="Data only lives in this browser's storage — use these to move it to another browser or Safari's Add to Dock app, or just to keep a backup">
              {importMsg && <span className="btn-label" style={{ fontSize: 10.5, color: importMsg === "Imported ✓" ? C.mint : C.rose, whiteSpace: "nowrap" }}>{importMsg}</span>}
              <button onClick={exportData} className="flex items-center gap-1" style={{ ...iconBtn, fontSize: 11, padding: "5px 8px", border: `1px solid ${LINE}`, borderRadius: 8 }} aria-label="Export data">
                <Download size={12} /> <span className="btn-label">Export</span>
              </button>
              <button onClick={triggerImport} className="flex items-center gap-1" style={{ ...iconBtn, fontSize: 11, padding: "5px 8px", border: `1px solid ${LINE}`, borderRadius: 8 }} aria-label="Import data">
                <Upload size={12} /> <span className="btn-label">Import</span>
              </button>
              <input ref={importInputRef} type="file" accept="application/json" onChange={handleImportFile} style={{ display: "none" }} />
            </div>
          </header>

          {/* scroll area — the only part of the page that scrolls; sidebar and header stay put.
              inner wrapper uses vertical auto-margins: short pages center in the available space
              (no dead strip at the bottom), long pages (Unlocks, long chains) just scroll normally
              since auto-margins collapse to 0 once content is taller than the viewport.
              Exception: the Mama tab is pinned to top (margin: 0) instead, so switching between
              its Creators/Tasks/AI Tools/Reports subtabs never jumps to mid-screen just because
              one subtab has less content than another. */}
          <div className="scroll" style={{ flex: 1, minHeight: 0, overflowY: "auto", padding: "28px 36px", display: "flex", flexDirection: "column", alignItems: "center" }}>
            <div style={{ width: "100%", maxWidth: 1360, margin: tab === "mama" ? "0" : "auto 0", paddingBottom: 44 }}>
              {tab === "overview" && <PriorityDashboard ally={ally} mama={mama} go={go} setAlly={setAlly} setMama={setMama} navigateToTask={navigateToTask} completeTask={completeTask} />}
              {tab === "content" && <ContentModule data={ally} setData={setAlly} q={q} />}
              {tab === "song" && <SongModule data={ally} setData={setAlly} />}
              {tab === "unlocks" && <UnlocksModule data={ally} setData={setAlly} />}
              {tab === "apartment" && <ApartmentModule data={ally} setData={setAlly} unlocked={aptUnlocked} go={go} q={q} />}
              {tab === "lifeAdmin" && <LifeAdminModule data={ally} setData={setAlly} q={q} />}
              {tab === "deals" && <DealsModule data={ally} setData={setAlly} q={q} navRequest={navRequest} />}
              {tab === "mama" && <MamaModule data={mama} setData={setMama} q={q} navRequest={navRequest} navigateToTask={navigateToTask} completeTask={completeTask} />}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ================= content health ================= */
function contentHealth(content) {
  const since = daysSince(content.lastPosted);
  const counts = Object.fromEntries(CONTENT_COLS.map((c) => [c, content.items.filter((i) => i.status === c).length]));
  const ready = counts["In Edit"];
  let tint = C.mint, msg = "On track. Keep the machine fed.";
  if (since === null) { tint = C.sky; msg = "Log when you last posted to start the runway clock."; }
  else if (since >= content.cadence && ready === 0) { tint = C.rose; msg = "Post overdue and nothing edited. Film or edit today."; }
  else if (since >= content.cadence) { tint = C.amber; msg = `Time to post. ${ready} edited and ready to go.`; }
  else if (ready === 0 && counts["To Film"] === 0) { tint = C.amber; msg = "Downstream pipeline is empty. Script and film next."; }
  return { since, counts, ready, tint, msg };
}

/* finds whichever underlying record a dashboard task-id belongs to (a deal, a client sub-task, a
   mama creator's sub-task, a chain node, etc.) and patches its priority — this is what makes
   dragging a chip between Urgent/Medium/Low columns on the dashboard itself actually work, and it's
   the same setAlly/setMama the source tab reads from, so the tab reflects it immediately too. */
function setPillarItemPriority(setAlly, setMama, pillar, id, priority) {
  if (pillar === "song") {
    setAlly((d) => ({ ...d, song: { ...d.song, stages: d.song.stages.map((s) => (s.id === id ? { ...s, priority } : s)) } }));
    return;
  }
  if (pillar === "unlocks") {
    setAlly((d) => {
      const eco = d.unlocks.ecosystem;
      const ecosystem = eco ? { ...eco, pillars: eco.pillars.map((pl) => ({ ...pl, benefits: pl.benefits.map((b) => (b.id === id ? { ...b, priority } : b)) })) } : eco;
      const chains = d.unlocks.chains.map((ch) => ({ ...ch, nodes: ch.nodes.map((n) => (n.id === id ? { ...n, priority } : n)) }));
      return { ...d, unlocks: { ...d.unlocks, ecosystem, chains } };
    });
    return;
  }
  if (pillar === "deals") {
    setAlly((d) => {
      const deals = d.deals.deals.map((deal) => {
        if (deal.id === id) return { ...deal, priority };
        if ((deal.tasks || []).some((t) => t.id === id)) return { ...deal, tasks: deal.tasks.map((t) => (t.id === id ? { ...t, priority } : t)) };
        return deal;
      });
      const clients = d.deals.clients.map((c) => ((c.tasks || []).some((t) => t.id === id) ? { ...c, tasks: c.tasks.map((t) => (t.id === id ? { ...t, priority } : t)) } : c));
      return { ...d, deals: { ...d.deals, deals, clients } };
    });
    return;
  }
  if (pillar === "mama") {
    setMama((d) => ({
      ...d,
      tasks: d.tasks.map((t) => (t.id === id ? { ...t, priority } : t)),
      creators: d.creators.map((cr) => ((cr.tasks || []).some((t) => t.id === id) ? { ...cr, tasks: cr.tasks.map((t) => (t.id === id ? { ...t, priority } : t)) } : cr)),
      tools: d.tools.map((tl) => ((tl.tasks || []).some((t) => t.id === id) ? { ...tl, tasks: tl.tasks.map((t) => (t.id === id ? { ...t, priority } : t)) } : tl)),
      reports: d.reports.map((rp) => ((rp.tasks || []).some((t) => t.id === id) ? { ...rp, tasks: rp.tasks.map((t) => (t.id === id ? { ...t, priority } : t)) } : rp)),
    }));
    return;
  }
  /* content has no draggable per-item priority — it's a single master signal, not handled here */
}

/* marks a dashboard task's underlying record complete/done, using whatever "done" mechanism its
   own source tab already uses (a checkbox toggle, a status column, an eco-state cycle...) — same
   setAlly/setMama as setPillarItemPriority above, so the source tab and every ring/percentage that
   depends on it update in the same tick the checkbox is ticked. Keyed off task.sourceType, which
   collectPriorityTasks / MamaTaskDashboard stamp onto every task alongside the nav fields below. */
function completePriorityTask(setAlly, setMama, task) {
  const now = Date.now();
  switch (task.sourceType) {
    case "song":
      setAlly((d) => ({ ...d, song: { ...d.song, stages: d.song.stages.map((s) => (s.id === task.id ? { ...s, status: "done", lastProgress: todayISO() } : s)) } }));
      return;
    case "unlocksBenefit":
      setAlly((d) => {
        const eco = d.unlocks.ecosystem;
        if (!eco) return d;
        return { ...d, unlocks: { ...d.unlocks, ecosystem: { ...eco, pillars: eco.pillars.map((pl) => ({ ...pl, benefits: pl.benefits.map((b) => (b.id === task.id ? { ...b, state: "live" } : b)) })) } } };
      });
      return;
    case "unlocksNode":
      setAlly((d) => ({ ...d, unlocks: { ...d.unlocks, chains: d.unlocks.chains.map((ch) => ({ ...ch, nodes: ch.nodes.map((n) => (n.id === task.id ? { ...n, status: "done" } : n)) })) } }));
      return;
    case "deal":
      setAlly((d) => ({ ...d, deals: { ...d.deals, deals: d.deals.deals.map((x) => (x.id === task.id ? { ...x, stage: "Posted" } : x)) } }));
      return;
    case "dealTask":
      setAlly((d) => ({ ...d, deals: { ...d.deals, deals: d.deals.deals.map((x) => ((x.tasks || []).some((t) => t.id === task.id) ? { ...x, tasks: x.tasks.map((t) => (t.id === task.id ? { ...t, done: true, doneAt: now } : t)) } : x)) } }));
      return;
    case "clientTask":
      setAlly((d) => ({ ...d, deals: { ...d.deals, clients: d.deals.clients.map((c) => ((c.tasks || []).some((t) => t.id === task.id) ? { ...c, tasks: c.tasks.map((t) => (t.id === task.id ? { ...t, done: true, doneAt: now } : t)) } : c)) } }));
      return;
    case "mamaAdmin":
      setMama((d) => ({ ...d, tasks: d.tasks.map((t) => (t.id === task.id ? { ...t, status: "Done", doneAt: now } : t)) }));
      return;
    case "mamaCreator":
      setMama((d) => ({ ...d, creators: d.creators.map((cr) => ((cr.tasks || []).some((t) => t.id === task.id) ? { ...cr, tasks: cr.tasks.map((t) => (t.id === task.id ? { ...t, done: true, doneAt: now } : t)) } : cr)) }));
      return;
    case "mamaTool":
      setMama((d) => ({ ...d, tools: d.tools.map((tl) => ((tl.tasks || []).some((t) => t.id === task.id) ? { ...tl, tasks: tl.tasks.map((t) => (t.id === task.id ? { ...t, done: true, doneAt: now } : t)) } : tl)) }));
      return;
    case "mamaReport":
      setMama((d) => ({ ...d, reports: d.reports.map((rp) => ((rp.tasks || []).some((t) => t.id === task.id) ? { ...rp, tasks: rp.tasks.map((t) => (t.id === task.id ? { ...t, done: true, doneAt: now } : t)) } : rp)) }));
      return;
    case "lifeAdmin":
      setAlly((d) => ({ ...d, lifeAdmin: { ...d.lifeAdmin, items: d.lifeAdmin.items.map((t) => (t.id === task.id ? { ...t, status: "Done", doneAt: now } : t)) } }));
      return;
  }
}

/* finds the DOM node a dashboard task points at (every source render tags its own task's root
   element with data-nav-id={id}) and scrolls it into view + gives it a ~1s blinking highlight, then
   removes the flash class. Retries for a bit because the target tab/subtab/expand-card usually
   still needs one or two renders to mount after navigateToTask fires (tab switch -> module mounts
   -> its own effect flips a subtab/openId -> that renders the actual element) — polling sidesteps
   having to hand-sequence those renders exactly. Gives up silently after ~1.2s if nothing turns up. */
function scrollAndHighlight(id, attempts) {
  if (attempts === undefined) attempts = 20;
  const el = document.querySelector(`[data-nav-id="${id}"]`);
  if (el) {
    el.scrollIntoView({ behavior: "smooth", block: "center" });
    el.classList.add("nav-highlight");
    setTimeout(() => el.classList.remove("nav-highlight"), 1000);
    return;
  }
  if (attempts > 0) setTimeout(() => scrollAndHighlight(id, attempts - 1), 60);
}

/* ================= PRIORITY DASHBOARD ================= */
function PriorityDashboard({ ally, mama, go, setAlly, setMama, navigateToTask, completeTask }) {
  const tasks = collectPriorityTasks(ally, mama);
  const byPillar = Object.fromEntries(PRIORITY_PILLARS.map((k) => [k, tasks.filter((t) => t.pillar === k)]));
  const contentUrgency = computeContentUrgency(ally.content);
  const fillPct = Object.fromEntries(PRIORITY_PILLARS.map((k) => [k, k === "content" ? contentUrgency.pct : computePillarFillPercent(byPillar[k])]));
  const ranked = [...PRIORITY_PILLARS].sort((a, b) => fillPct[b] - fillPct[a]);
  const rankOf = Object.fromEntries(ranked.map((k, i) => [k, i + 1]));
  const onDropPriority = (pillar, id, priority) => setPillarItemPriority(setAlly, setMama, pillar, id, priority);

  return (
    <section>
      <div style={{ marginBottom: 20 }}>
        <h1 style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 700, fontSize: "clamp(28px,4.5vw,38px)", margin: 0, letterSpacing: "-0.02em" }}>Priorities right now 🎯</h1>
        <p style={{ fontSize: 15, color: MUT, margin: "6px 0 0" }}>{tasks.length} open item{tasks.length === 1 ? "" : "s"} across all {PRIORITY_PILLARS.length} pillars. Each card fills its own ring by how urgent that pillar is on its own — blue is calm, red means it needs you today, and a ring that overflows past 100% is in critical territory.</p>
      </div>

      {/* every pillar gets its own independent ring, ranked left to right by how full it is.
          min-width 360 (vs the 280 other grids in the app use) keeps this specific grid at 3
          per row instead of 4 on a full-width screen, still auto-fit so it still reflows down
          to fewer columns on narrower windows. */}
      <div className="grid gap-4" style={{ gridTemplateColumns: "repeat(auto-fit, minmax(360px, 1fr))" }}>
        {ranked.map((k) => (
          k === "content"
            ? <ContentPillarCard key={k} content={ally.content} go={go} rank={rankOf[k]} pct={fillPct[k]} />
            : <PriorityPillarCard key={k} pillarKey={k} tasks={byPillar[k]} go={go} rank={rankOf[k]} onDropPriority={onDropPriority} pct={fillPct[k]} onNavigate={navigateToTask} onComplete={completeTask} />
        ))}
      </div>
    </section>
  );
}

const PRIORITY_COL_TINT = { Urgent: C.rose, Medium: C.amber, Low: C.sky };

/* Content's card doesn't show Urgent/Medium/Low task columns like the other pillars — content has no
   individual priorities anymore, just one master signal (days since last post, entirely independent
   of the pipeline) rendered as its own fill ring, plus a glance at where ideas sit in the pipeline. */
function ContentPillarCard({ content, go, rank, pct }) {
  const mod = MODULES.content;
  const since = daysSince(content.lastPosted);
  const tint = urgencyTint(pct);
  const critical = pct > 100;
  const pipelineCols = ["In Edit", "To Film", "Ideas"];
  const counts = Object.fromEntries(pipelineCols.map((c) => [c, content.items.filter((i) => i.status === c).length]));
  /* two separate deadline feeds so filming deadlines and editing deadlines stay visually apart —
     title pulls through by title only (never the script/desc box), same rule every other pillar
     follows. The ring above stays purely days-since-post driven regardless of what's in either list. */
  const toFilmDated = content.items.filter((i) => i.status === "To Film" && i.due && !i.filmed).sort((a, b) => daysUntil(a.due) - daysUntil(b.due)).slice(0, 3);
  const toEditDated = content.items.filter((i) => i.status === "In Edit" && i.due).sort((a, b) => daysUntil(a.due) - daysUntil(b.due)).slice(0, 3);
  return (
    <div onClick={() => go("content")} className="rounded-2xl p-5" style={{ ...card, borderRadius: 18, borderLeft: `4px solid ${mod.accent}`, cursor: "pointer" }}>
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-2 min-w-0">
          <span style={{ width: 28, height: 28, borderRadius: 99, background: mod.accent, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 700, fontSize: 14, flexShrink: 0 }}>{rank}</span>
          <span style={{ fontSize: 17, flexShrink: 0 }}>{mod.emoji}</span>
          <span style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 700, fontSize: 16, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{mod.label}</span>
        </div>
        <ArrowUpRight size={16} color={MUT} />
      </div>
      <div className="flex flex-col items-center text-center" style={{ padding: "6px 0 16px" }}>
        <Ring pct={Math.min(1, pct / 100)} tint={tint} size={148} thick={16} label={`${Math.round(pct)}%`} />
        <div style={{ fontSize: 13.5, fontWeight: 600, color: tint, marginTop: 10 }}>{since === null ? "no post logged yet" : since === 1 ? "1 day since last post" : `${since} days since last post`}</div>
        {critical && <div style={{ fontSize: 10.5, fontWeight: 700, color: C.rose, marginTop: 3, letterSpacing: "0.03em" }}>⚠ CRITICAL — post overdue</div>}
      </div>
      <div className="grid gap-2" style={{ gridTemplateColumns: "repeat(3, 1fr)" }}>
        {pipelineCols.map((c) => (
          <div key={c} className="rounded-lg py-2 text-center" style={{ background: C.soft, border: `1px solid ${LINE}` }}>
            <div style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 700, fontSize: 19, color: CONTENT_TINT[c] }}>{counts[c]}</div>
            <div style={{ fontSize: 9.5, letterSpacing: "0.04em", textTransform: "uppercase", color: MUT, marginTop: 2 }}>{c}</div>
          </div>
        ))}
      </div>
      {(toFilmDated.length > 0 || toEditDated.length > 0) && (
        <div className="grid gap-3 mt-3 pt-3" style={{ gridTemplateColumns: "1fr 1fr", borderTop: `1px solid ${LINE}` }}>
          <div className="flex flex-col gap-1.5" style={{ minWidth: 0 }}>
            <div style={{ fontSize: 10, letterSpacing: "0.06em", textTransform: "uppercase", color: MUT }}>To Film</div>
            {toFilmDated.map((i) => (
              <div key={i.id} className="flex items-center justify-between gap-2" style={{ fontSize: 12 }}>
                <span style={{ whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{i.title}</span>
                <DueChip due={i.due} />
              </div>
            ))}
            {toFilmDated.length === 0 && <div style={{ fontSize: 11.5, color: FAINT }}>—</div>}
          </div>
          <div className="flex flex-col gap-1.5" style={{ minWidth: 0 }}>
            <div style={{ fontSize: 10, letterSpacing: "0.06em", textTransform: "uppercase", color: MUT }}>To Edit</div>
            {toEditDated.map((i) => (
              <div key={i.id} className="flex items-center justify-between gap-2" style={{ fontSize: 12 }}>
                <span style={{ whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{i.title}</span>
                <DueChip due={i.due} />
              </div>
            ))}
            {toEditDated.length === 0 && <div style={{ fontSize: 11.5, color: FAINT }}>—</div>}
          </div>
        </div>
      )}
    </div>
  );
}

/* dragging a chip between Urgent/Medium/Low sets its underlying priority (High/Medium/Low) via
   setPillarItemPriority, so it feeds straight back into the item's own tab. Drops carry their
   source pillar in the payload, so a drop is ignored unless it lands on a column in its own card —
   dragging across cards (e.g. Deals into Mama) is a strict no-op by design. */
const DROP_PRIORITY = { Urgent: "High", Medium: "Medium", Low: "Low" };

function PriorityPillarCard({ pillarKey, tasks, go, rank, onDropPriority, pct, onNavigate, onComplete }) {
  const mod = MODULES[pillarKey];
  const cols = ["Urgent", "Medium", "Low"];
  const [dragOverCol, setDragOverCol] = useState(null);
  const tint = urgencyTint(pct);
  const critical = pct > 100;
  const handleDrop = (e, col) => {
    e.preventDefault();
    setDragOverCol(null);
    let payload;
    try { payload = JSON.parse(e.dataTransfer.getData("application/json")); } catch (err) { return; }
    if (!payload || payload.pillar !== pillarKey) return; // strictly within-card only
    onDropPriority(pillarKey, payload.id, DROP_PRIORITY[col]);
  };
  return (
    <div onClick={() => go(pillarKey)} className="rounded-2xl p-5" style={{ ...card, borderRadius: 18, borderLeft: `4px solid ${mod.accent}`, cursor: "pointer" }}>
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-2 min-w-0">
          <span style={{ width: 28, height: 28, borderRadius: 99, background: mod.accent, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 700, fontSize: 14, flexShrink: 0 }}>{rank}</span>
          <span style={{ fontSize: 17, flexShrink: 0 }}>{mod.emoji}</span>
          <span style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 700, fontSize: 16, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{mod.label}</span>
        </div>
        <ArrowUpRight size={16} color={MUT} />
      </div>
      <div className="flex flex-col items-center text-center" style={{ padding: "6px 0 16px" }}>
        <Ring pct={Math.min(1, pct / 100)} tint={tint} size={148} thick={16} label={`${Math.round(pct)}%`} />
        {critical && <span style={{ fontSize: 10.5, fontWeight: 700, color: C.rose, letterSpacing: "0.03em", marginTop: 10 }}>⚠ CRITICAL — overloaded</span>}
      </div>
      <div className="grid gap-2.5" style={{ gridTemplateColumns: "repeat(3, 1fr)" }}>
        {cols.map((col) => {
          const items = tasks.filter((t) => t.bucket === col).sort((a, b) => b.score - a.score);
          return (
            <div key={col}
              onDragOver={(e) => { e.preventDefault(); if (dragOverCol !== col) setDragOverCol(col); }}
              onDragLeave={() => setDragOverCol((c) => (c === col ? null : c))}
              onDrop={(e) => handleDrop(e, col)}
              style={{ minWidth: 0, borderRadius: 10, padding: 4, margin: -4, background: dragOverCol === col ? `${PRIORITY_COL_TINT[col]}14` : "transparent", outline: dragOverCol === col ? `1px dashed ${PRIORITY_COL_TINT[col]}` : "none", transition: "background 0.1s" }}>
              <div style={{ fontSize: 11, letterSpacing: "0.04em", textTransform: "uppercase", color: PRIORITY_COL_TINT[col], fontWeight: 700, marginBottom: 6 }}>{col} <span style={{ color: MUT, fontWeight: 400 }}>{items.length}</span></div>
              <div className="flex flex-col gap-1.5">
                {items.slice(0, 3).map((t) => (
                  <div key={t.id} draggable onDragStart={(e) => { e.dataTransfer.setData("application/json", JSON.stringify({ id: t.id, pillar: pillarKey })); e.dataTransfer.effectAllowed = "move"; }}
                    onClick={(e) => e.stopPropagation()} className="rounded-lg px-2 py-1.5 flex items-start gap-1.5"
                    style={{ background: C.soft, border: `1px solid ${LINE}`, borderLeft: `2px solid ${PRIORITY_COL_TINT[col]}`, cursor: "grab" }}>
                    <button onClick={(e) => { e.stopPropagation(); onComplete(t); }} aria-label="Mark complete" title="Mark complete"
                      style={{ width: 14, height: 14, borderRadius: 5, cursor: "pointer", flexShrink: 0, marginTop: 2, padding: 0, background: "transparent", border: `1px solid ${LINE}` }} />
                    <div style={{ flex: 1, minWidth: 0, cursor: "pointer" }} onClick={(e) => { e.stopPropagation(); onNavigate(t); }}>
                      <div style={{ fontSize: 12.5, lineHeight: 1.3 }}>{t.title}</div>
                      {t.daysUntilDue !== null && <div style={{ fontSize: 11, color: PRIORITY_COL_TINT[col], marginTop: 2 }}>{t.daysUntilDue < 0 ? `${-t.daysUntilDue}d overdue` : t.daysUntilDue === 0 ? "today" : `${t.daysUntilDue}d`}</div>}
                    </div>
                  </div>
                ))}
                {items.length === 0 && <div style={{ fontSize: 12, color: FAINT, padding: "4px 0" }}>—</div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function DueChip({ due, inline }) {
  const d = daysUntil(due);
  if (d === null) return null;
  const tint = d < 0 ? C.rose : d <= 2 ? C.amber : MUT;
  const text = d < 0 ? `overdue ${-d}d` : d === 0 ? "today" : `${d}d`;
  if (inline) return <span style={{ color: tint }}>{text}</span>;
  return <span style={{ fontSize: 10.5, color: tint, background: `${tint}1a`, border: `1px solid ${tint}44`, borderRadius: 99, padding: "2px 8px", flexShrink: 0 }}>{text}</span>;
}

/* the same day bands as dueBandScore, but returning an actual priority label instead of a score —
   this is what makes picking a date auto-select the priority. High = due today or overdue,
   Medium = due 1-3 days out, Low = due 4+ days out. Content is untouched by this — it has its own
   separate days-since-last-post urgency model (computeContentUrgency), no due dates involved. */
function priorityFromDueDate(daysUntilDue) {
  if (daysUntilDue === null || daysUntilDue === undefined) return null;
  if (daysUntilDue <= 0) return "High";   // today or overdue
  if (daysUntilDue <= 3) return "Medium"; // due in 1-3 days
  return "Low";                            // due 4+ days out
}

/* used by every task-capture form (Admin Tasks, Life Admin, MiniTaskList) so picking an optional
   due date at creation time auto-selects the right starting priority instead of always defaulting
   to Medium — same day bands as priorityFromDueDate/PriorityControls, so there's no gap where a
   freshly-captured task with a close date briefly shows the wrong priority before the next render. */
function priorityForNewTask(due) {
  return due ? (priorityFromDueDate(daysUntil(due)) || "Medium") : "Medium";
}

/* shared control row: due date + priority (Low/Med/High) + log progress + due-date readout.
   Used on every item across the 6 pillars so the Priorities dashboard can score them all the same way.
   Whenever a due date is set, the priority is auto-selected from it and kept in sync continuously as
   the date gets closer (today or overdue -> High, 1-3 days -> Medium, 4+ days -> Low) — same day bands
   as the Urgent/Medium/Low bucket, so nothing here can disagree with the dashboard. A deadline is
   pass/fail, so once a date is set it drives the priority; the two non-matching L/M/H buttons grey
   out (they're not there to be manually overridden away from what the calendar says). Clear the due
   date, or pause the item, to take manual control of priority again.
   Clicking the already-selected priority button again PAUSES this item instead: it stops feeding the
   Priorities dashboard entirely (collectPriorityTasks skips anything with .paused), the due date
   clears and greys out, and none of L/M/H show as selected. It's for things you want to keep on the
   board but haven't decided are a live priority yet — existing, not urgent. Clicking any L/M/H
   button again un-pauses it, picks that priority, and resets the due date back to blank so you set
   a fresh one rather than reviving a stale old date. */
function PriorityControls({ item, onChange, hideDue }) {
  const u = computeUrgency(item);
  const pr = item.priority || "Medium";
  const paused = !!item.paused;
  const dateTarget = paused ? null : priorityFromDueDate(u.daysUntilDue);
  useEffect(() => {
    if (dateTarget && pr !== dateTarget) onChange({ priority: dateTarget });
  }, [dateTarget, pr]);
  const dueTint = u.daysUntilDue === null ? MUT : u.daysUntilDue < 0 ? C.rose : u.daysUntilDue <= 2 ? C.amber : MUT;
  const setPriority = (p) => {
    if (paused) onChange({ priority: p, paused: false, due: null });
    else if (pr === p) onChange({ paused: true, due: null });
    else if (!dateTarget) onChange({ priority: p }); // no date driving it -> free manual choice
    // else: a due date is actively setting this item's priority; only the matching button (handled
    // above via pr === p, which pauses) does anything — the other two are disabled below.
  };
  return (
    <div className="flex items-center gap-1.5 flex-wrap mt-1.5" style={{ fontSize: 11, opacity: paused ? 0.55 : 1 }}>
      {!hideDue && (
        <input type="date" value={item.due || ""} disabled={paused} onChange={(e) => onChange({ due: e.target.value || null })}
          className="rounded-md" style={{ ...darkInput, fontSize: 10.5, padding: "3px 5px", cursor: paused ? "not-allowed" : "text" }} aria-label="Due date" />
      )}
      <div className="flex gap-1">
        {PRIORITY_LEVELS.map((p) => {
          const locked = !!dateTarget && p !== dateTarget;
          return (
            <button key={p} onClick={() => setPriority(p)} disabled={locked} className="rounded-full px-2 py-0.5"
              title={!paused && pr === p && !dateTarget ? "Click again to pause — stop tracking this as a priority"
                : !paused && pr === p && dateTarget ? "Set by the due date. Click to pause, or clear/edit the date to change it."
                : paused ? "Paused — click a level to resume"
                : locked ? "Set by the due date — clear the date or pause to override manually" : undefined}
              style={{ fontSize: 10, cursor: locked ? "not-allowed" : "pointer", fontFamily: "inherit",
                background: !paused && pr === p ? `${PRIORITY_TINT[p]}22` : FILL, border: `1px solid ${!paused && pr === p ? PRIORITY_TINT[p] : LINE}`,
                color: !paused && pr === p ? PRIORITY_TINT[p] : locked ? FAINT : MUT, opacity: locked ? 0.5 : 1 }}>{p[0]}</button>
          );
        })}
      </div>
      <button onClick={() => onChange({ lastProgress: todayISO() })} className="flex items-center gap-1 rounded-full px-2 py-0.5"
        style={{ fontSize: 10, cursor: "pointer", fontFamily: "inherit", background: FILL, border: `1px solid ${LINE}`, color: MUT }}
        title="Log progress today"><Zap size={10} /> progress</button>
      {paused ? (
        <span style={{ marginLeft: "auto", color: FAINT, fontWeight: 600, whiteSpace: "nowrap" }}>paused</span>
      ) : u.daysUntilDue !== null ? (
        <span style={{ marginLeft: "auto", color: dueTint, fontWeight: 600, whiteSpace: "nowrap" }}>
          {u.daysUntilDue < 0 ? `${-u.daysUntilDue}d overdue` : u.daysUntilDue === 0 ? "today" : `${u.daysUntilDue}d`}
        </span>
      ) : null}
    </div>
  );
}

/* ================= CONTENT ================= */
/* ---- rich text paste sanitizer for the skit script box ----
   goal: let bold / italic / font size survive a paste from Claude, Docs, Word, Notion etc,
   without dragging in the source's colors or backgrounds, and without literal pasted sizes
   blowing out this small card. every size found (explicit or implied by a heading tag) gets
   rescaled onto a small fixed range relative to the box's own font size, so relative emphasis
   (this was bigger than that) survives but nothing can overflow. */
const SCRIPT_SIZE_MIN = 0.85, SCRIPT_SIZE_MAX = 1.7, SCRIPT_ASSUMED_SOURCE_BASE_PX = 16;
const SCRIPT_SIZE_STEPS = [0.85, 1, 1.15, 1.35, 1.6];
const SCRIPT_HEADING_EM = { H1: 2, H2: 1.5, H3: 1.17, H4: 1, H5: 0.83, H6: 0.67 };
const SCRIPT_ALLOWED_INLINE = { B: 1, STRONG: 1, I: 1, EM: 1, U: 1, BR: 1, P: 1, DIV: 1, SPAN: 1, UL: 1, OL: 1, LI: 1 };

function scriptToPx(raw, parentPx) {
  if (!raw) return null;
  raw = raw.trim();
  const m = raw.match(/^([\d.]+)\s*(px|pt|em|rem|%)$/i);
  if (!m) return null;
  const num = parseFloat(m[1]), unit = m[2].toLowerCase();
  if (unit === "px") return num;
  if (unit === "pt") return num * (96 / 72);
  if (unit === "em") return num * (parentPx || SCRIPT_ASSUMED_SOURCE_BASE_PX);
  if (unit === "rem") return num * SCRIPT_ASSUMED_SOURCE_BASE_PX;
  if (unit === "%") return (num / 100) * (parentPx || SCRIPT_ASSUMED_SOURCE_BASE_PX);
  return null;
}
function scriptNormalizeSize(px) {
  const ratio = px / SCRIPT_ASSUMED_SOURCE_BASE_PX;
  return Math.min(SCRIPT_SIZE_MAX, Math.max(SCRIPT_SIZE_MIN, ratio));
}
function scriptStyleFromDecl(styleAttr) {
  const out = {};
  if (!styleAttr) return out;
  styleAttr.split(";").forEach((decl) => {
    const parts = decl.split(":");
    if (parts.length < 2) return;
    const key = parts[0].trim().toLowerCase();
    const val = parts.slice(1).join(":").trim();
    if (key === "font-size") out.fontSize = val;
    if (key === "font-weight") out.fontWeight = val;
    if (key === "font-style") out.fontStyle = val;
    if (key === "text-decoration") out.textDecoration = val;
    /* color, background, background-color, font-family: intentionally dropped */
  });
  return out;
}
function scriptSanitizeNode(node, parentPx, out) {
  if (node.nodeType === Node.TEXT_NODE) { out.appendChild(document.createTextNode(node.textContent)); return; }
  if (node.nodeType !== Node.ELEMENT_NODE) return;
  const tag = node.tagName;
  const decl = scriptStyleFromDecl(node.getAttribute("style"));
  const explicitPx = decl.fontSize ? scriptToPx(decl.fontSize, parentPx) : null;
  const headingPx = SCRIPT_HEADING_EM[tag] ? SCRIPT_HEADING_EM[tag] * SCRIPT_ASSUMED_SOURCE_BASE_PX : null;
  const sourcePx = explicitPx || headingPx || parentPx;
  const isHeading = !!SCRIPT_HEADING_EM[tag];
  let container;
  if (isHeading || explicitPx) {
    container = document.createElement("span");
    const scale = scriptNormalizeSize(sourcePx);
    let css = "font-size:" + scale.toFixed(2) + "em;";
    if (isHeading) css += "font-weight:600;";
    if (decl.fontWeight) css += "font-weight:" + decl.fontWeight + ";";
    if (decl.fontStyle) css += "font-style:" + decl.fontStyle + ";";
    if (decl.textDecoration) css += "text-decoration:" + decl.textDecoration + ";";
    container.setAttribute("style", css);
  } else if (SCRIPT_ALLOWED_INLINE[tag]) {
    container = document.createElement(tag.toLowerCase());
    if (decl.fontWeight) container.style.fontWeight = decl.fontWeight;
    if (decl.fontStyle) container.style.fontStyle = decl.fontStyle;
    if (decl.textDecoration) container.style.textDecoration = decl.textDecoration;
  } else {
    /* unknown/disallowed tag (a, img, table, font, o:p, etc): unwrap, keep text + children */
    container = document.createDocumentFragment();
  }
  for (let i = 0; i < node.childNodes.length; i++) scriptSanitizeNode(node.childNodes[i], sourcePx, container);
  if (isHeading) container.appendChild(document.createElement("br"));
  out.appendChild(container);
}
function scriptSanitizeHtml(html) {
  const doc = new DOMParser().parseFromString(html, "text/html");
  const out = document.createDocumentFragment();
  for (let i = 0; i < doc.body.childNodes.length; i++) scriptSanitizeNode(doc.body.childNodes[i], SCRIPT_ASSUMED_SOURCE_BASE_PX, out);
  const wrapper = document.createElement("div");
  wrapper.appendChild(out);
  return wrapper.innerHTML;
}
function scriptEscapeToHtml(text) {
  const div = document.createElement("div");
  div.textContent = text || "";
  return div.innerHTML.replace(/\n/g, "<br>");
}

/* skit script box: collapsed to a single line by default (so the board stays compact),
   auto-grows to fit whatever's pasted in once focused, and can be manually collapsed
   back down without losing the text underneath. rich text: bold/italic/size survive a paste,
   color and background never do. `isHtml` distinguishes old plain-text scripts (saved before
   this existed) from new ones, so nothing already saved gets misread as markup.
   shortcuts (act on a text selection only): Cmd/Ctrl+B bold, Cmd/Ctrl+I italic,
   Cmd/Ctrl+Shift+. bump the selection up a size, Cmd/Ctrl+Shift+, bump it down. */
function ScriptBox({ value, isHtml, open, onFocus, onChange, onToggle }) {
  const ref = useRef(null);
  const lastSeededRef = useRef(null);
  const savedRangeRef = useRef(null);

  useEffect(() => {
    if (!ref.current) return;
    const focused = document.activeElement === ref.current;
    if (focused) return; /* never clobber the DOM mid-edit, that's what causes cursor jumps */
    if (lastSeededRef.current === value) return;
    ref.current.innerHTML = isHtml ? (value || "") : scriptEscapeToHtml(value);
    lastSeededRef.current = value;
  }, [value, isHtml]);

  const commit = () => {
    const html = ref.current.innerHTML;
    lastSeededRef.current = html;
    onChange(html);
  };
  const exec = (cmd) => { ref.current.focus(); document.execCommand(cmd); commit(); };

  /* resolve the target scale relative to the SELECTION'S CURRENT rendered size, not a naive
     nested-em stack, so repeated resizing (or resizing text that's already inside a sized span)
     lands on the intended absolute tier instead of compounding. */
  const wrapRangeWithScale = (range, targetScale) => {
    const boxBasePx = parseFloat(window.getComputedStyle(ref.current).fontSize) || 12.5;
    const startEl = range.startContainer.nodeType === 1 ? range.startContainer : range.startContainer.parentElement;
    const currentPx = parseFloat(window.getComputedStyle(startEl).fontSize) || boxBasePx;
    const relativeEm = (boxBasePx * targetScale) / currentPx;
    const span = document.createElement("span");
    span.style.fontSize = relativeEm.toFixed(3) + "em";
    try { range.surroundContents(span); } catch (e) { const frag = range.extractContents(); span.appendChild(frag); range.insertNode(span); }
    commit();
  };
  const applySize = (targetScale) => {
    const sel = window.getSelection();
    if (savedRangeRef.current) { sel.removeAllRanges(); sel.addRange(savedRangeRef.current); }
    if (!sel.rangeCount || sel.isCollapsed) return;
    wrapRangeWithScale(sel.getRangeAt(0), parseFloat(targetScale));
  };
  const stepSize = (dir) => {
    const sel = window.getSelection();
    if (!sel.rangeCount || sel.isCollapsed) return; /* text only: no-op without an actual selection */
    const range = sel.getRangeAt(0);
    const boxBasePx = parseFloat(window.getComputedStyle(ref.current).fontSize) || 12.5;
    const startEl = range.startContainer.nodeType === 1 ? range.startContainer : range.startContainer.parentElement;
    const currentPx = parseFloat(window.getComputedStyle(startEl).fontSize) || boxBasePx;
    const currentScale = currentPx / boxBasePx;
    let idx = 0, bestDiff = Infinity;
    SCRIPT_SIZE_STEPS.forEach((s, i) => { const d = Math.abs(s - currentScale); if (d < bestDiff) { bestDiff = d; idx = i; } });
    const newIdx = Math.min(SCRIPT_SIZE_STEPS.length - 1, Math.max(0, idx + dir));
    wrapRangeWithScale(range, SCRIPT_SIZE_STEPS[newIdx]);
  };
  const handleKeyDown = (e) => {
    const mod = e.metaKey || e.ctrlKey;
    if (!mod) return;
    const k = e.key.toLowerCase();
    if (k === "b") { e.preventDefault(); exec("bold"); return; }
    if (k === "i") { e.preventDefault(); exec("italic"); return; }
    if (e.key === ">" || (e.shiftKey && e.key === ".")) { e.preventDefault(); stepSize(1); return; }
    if (e.key === "<" || (e.shiftKey && e.key === ",")) { e.preventDefault(); stepSize(-1); return; }
  };
  const handlePaste = (e) => {
    e.preventDefault();
    const html = e.clipboardData.getData("text/html");
    const text = e.clipboardData.getData("text/plain");
    const insert = html ? scriptSanitizeHtml(html) : scriptEscapeToHtml(text);
    document.execCommand("insertHTML", false, insert);
    commit();
  };
  const miniBtn = { background: "rgba(255,255,255,0.06)", border: `1px solid ${LINE}`, color: C.ink, width: 22, height: 22, borderRadius: 6, cursor: "pointer", fontSize: 11, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Outfit', sans-serif" };
  const miniSelect = { background: "rgba(255,255,255,0.06)", border: `1px solid ${LINE}`, color: C.ink, borderRadius: 6, fontSize: 10.5, fontFamily: "'Outfit', sans-serif", padding: "2px 4px" };

  return (
    <div className="mt-1.5">
      <button onClick={onToggle} className="flex items-center gap-1" style={{ ...iconBtn, padding: 0, fontSize: 10, color: FAINT }}>
        {open ? <ChevronUp size={10} /> : <ChevronDown size={10} />}
        <span>{open ? "Collapse script" : value ? "Expand script" : "Add script"}</span>
      </button>
      {open && (
        <div className="flex items-center gap-1 mt-1">
          <div onMouseDown={(e) => e.preventDefault()} className="flex items-center gap-1">
            <button type="button" onClick={() => exec("bold")} style={miniBtn} aria-label="Bold" title="Bold (Cmd+B)"><b>B</b></button>
            <button type="button" onClick={() => exec("italic")} style={miniBtn} aria-label="Italic" title="Italic (Cmd+I)"><i>i</i></button>
          </div>
          <select
            onMouseDown={() => { const sel = window.getSelection(); savedRangeRef.current = sel.rangeCount ? sel.getRangeAt(0).cloneRange() : null; }}
            onChange={(e) => { const v = e.target.value; if (v) applySize(v); e.target.value = ""; }}
            defaultValue="" style={miniSelect} aria-label="Font size" title="Font size (Cmd+Shift+. / ,)">
            <option value="">Size</option>
            <option value="0.85">Small</option>
            <option value="1">Normal</option>
            <option value="1.15">Medium</option>
            <option value="1.35">Large</option>
            <option value="1.6">Huge</option>
          </select>
        </div>
      )}
      <div ref={ref} contentEditable suppressContentEditableWarning
        onFocus={onFocus} onInput={commit} onPaste={handlePaste} onKeyDown={handleKeyDown}
        data-placeholder="Paste the skit script here…" className="w-full rounded-lg px-2.5 py-1.5 mt-1 script-editable"
        style={{ ...inputStyle, fontSize: 12.5, lineHeight: 1.5, overflow: open ? "visible" : "hidden", height: open ? "auto" : 28, minHeight: 28 }} />
    </div>
  );
}

        <div className="flex-1" style={{ minWidth: 220 }}>

      </div>

                        title={i.filmed ? "Deadline turned off — double-click to turn it back on" : "Mark filmed — turns off this idea's deadline/priority until you double-click it back on"}>
                        {i.filmed ? "✓ FILMED" : "FILMED"}
                      </button>

                    <div className="flex items-center gap-1 mt-1.5"><span className="ml-auto flex gap-1">
                      {col !== "Idea" && <button onClick={() => move(i.id, -1)} style={{ ...iconBtn, padding: 2 }} aria-label="Back">←</button>}
